<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selamat Hari Raya | Cikgu Rizan</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', 'Arial', sans-serif;
      background: linear-gradient(145deg, #0b2a1f 0%, #1c4e3d 70%, #2e6b52 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
      color: #fef9e8;
    }

    /* latar belakang animasi awan & bulan */
    .background-elements {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    .bulan {
      position: absolute;
      top: 8%;
      right: 8%;
      width: 120px;
      height: 120px;
      background: #f9f3c5;
      border-radius: 50%;
      box-shadow: 0 0 50px #fff9cf, 0 0 100px #fdeaa8;
      animation: cahayaBulan 4s ease-in-out infinite alternate;
    }

    .bulan::before {
      content: "";
      position: absolute;
      top: -15px;
      left: -15px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: rgba(255, 255, 200, 0.1);
      filter: blur(20px);
    }

    @keyframes cahayaBulan {
      0% { box-shadow: 0 0 40px #ffefb0, 0 0 80px #fddf9e; transform: scale(1); }
      100% { box-shadow: 0 0 70px #fff3cc, 0 0 130px #ffecb3; transform: scale(1.03); }
    }

    .awan {
      position: absolute;
      background: rgba(245, 245, 240, 0.2);
      backdrop-filter: blur(6px);
      border-radius: 1000px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      animation: terapungAwan 16s infinite alternate ease-in-out;
    }

    .awan1 {
      width: 280px;
      height: 95px;
      top: 15%;
      left: -100px;
      background: rgba(255,255,250,0.25);
      filter: blur(2px);
    }

    .awan2 {
      width: 340px;
      height: 120px;
      bottom: 10%;
      right: -80px;
      background: rgba(255, 255, 245, 0.2);
      filter: blur(3px);
      animation-duration: 20s;
      animation-delay: -5s;
    }

    .awan3 {
      width: 200px;
      height: 70px;
      top: 45%;
      left: 5%;
      background: rgba(240, 240, 235, 0.18);
      filter: blur(4px);
      animation-duration: 14s;
      animation-delay: -2s;
    }

    @keyframes terapungAwan {
      0% { transform: translateX(0) translateY(0); }
      100% { transform: translateX(60px) translateY(15px); }
    }

    /* bintang berkelip */
    .bintang {
      position: absolute;
      background: #fffde7;
      border-radius: 50%;
      width: 3px;
      height: 3px;
      opacity: 0.5;
      box-shadow: 0 0 10px #fff7cf, 0 0 20px #ffecaa;
      animation: kelip 3s infinite alternate;
    }

    @keyframes kelip {
      0% { opacity: 0.2; transform: scale(0.8); }
      100% { opacity: 1; transform: scale(1.4); }
    }

    /* karpet geometrik / ketupat */
    .ketupat-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: radial-gradient(circle at 30% 40%, rgba(255,215,0,0.1) 0%, transparent 25%),
                        repeating-linear-gradient(45deg, rgba(210,180,140,0.05) 0px, rgba(210,180,140,0.05) 20px, transparent 20px, transparent 40px);
      pointer-events: none;
      z-index: 0;
    }

    /* main container */
    .raya-card {
      position: relative;
      z-index: 10;
      max-width: 1000px;
      width: 100%;
      background: rgba(255, 255, 245, 0.1);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 60px 60px 40px 40px;
      box-shadow: 0 30px 60px rgba(0, 20, 10, 0.5), 0 0 0 2px rgba(255, 215, 0, 0.3) inset;
      padding: 40px 25px 60px 25px;
      border: 1px solid rgba(255, 239, 150, 0.5);
      transition: 0.5s;
      animation: naikTurun 7s infinite alternate ease-in-out;
    }

    @keyframes naikTurun {
      0% { transform: translateY(0); box-shadow: 0 30px 50px rgba(0,0,0,0.3); }
      100% { transform: translateY(-12px); box-shadow: 0 45px 70px rgba(0, 30, 10, 0.6); }
    }

    /* hiasan pelita / lampu */
    .lampu-container {
      display: flex;
      justify-content: center;
      gap: 20px 40px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .lampu {
      width: 50px;
      height: 70px;
      background: #eeba5e;
      border-radius: 50% 50% 30% 30%;
      position: relative;
      box-shadow: 0 0 30px #ffb347;
      animation: kelipLampu 2.2s infinite alternate;
      transform-origin: top;
    }

    .lampu::before {
      content: "";
      position: absolute;
      top: -18px;
      left: 15px;
      width: 20px;
      height: 20px;
      background: #997b4b;
      border-radius: 4px 4px 0 0;
    }

    .lampu::after {
      content: "";
      position: absolute;
      bottom: -10px;
      left: 5px;
      width: 40px;
      height: 15px;
      background: #b88a4b;
      border-radius: 10px 10px 0 0;
      filter: blur(2px);
    }

    .lampu:nth-child(2) { background: #f7c56c; animation-delay: 0.4s; }
    .lampu:nth-child(3) { background: #ffd966; animation-delay: 0.8s; }
    .lampu:nth-child(4) { background: #e3aa5a; animation-delay: 0.2s; }
    .lampu:nth-child(5) { background: #f5b342; animation-delay: 1.1s; }

    @keyframes kelipLampu {
      0% { box-shadow: 0 0 15px #fdaa33; opacity: 0.9; transform: scaleY(1); }
      100% { box-shadow: 0 0 50px #ffcc66, 0 0 90px #ffbb33; opacity: 1; transform: scaleY(1.04); }
    }

    /* teks utama - dengan nama cikgu rizan BESAR */
    .salam {
      text-align: center;
      margin: 30px 0 20px;
    }

    .salam h1 {
      font-size: 3.8rem;
      font-weight: 800;
      letter-spacing: 3px;
      text-shadow: 0 4px 20px #f5b042, 0 8px 30px #1e4d33;
      background: linear-gradient(135deg, #ffeeaa, #fff5d0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 15px;
      animation: teksBerkilat 3s infinite alternate;
      line-height: 1.3;
    }

    /* NAMA CIKGU RIZAN SANGAT BESAR */
    .guru-nama {
      font-size: 5.5rem;        /* lebih besar dari h1 */
      font-weight: 900;
      display: block;
      line-height: 1.2;
      margin: 10px 0 5px;
      text-transform: uppercase;
      letter-spacing: 6px;
      background: linear-gradient(145deg, #ffd966, #fff0b5, #f9cb6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px #f1c232, 0 0 70px #ffb347, 0 10px 20px rgba(0,0,0,0.3);
      animation: kilatNama 2.8s infinite alternate ease-in-out;
    }

    @keyframes kilatNama {
      0% { text-shadow: 0 0 25px #f3b544, 0 0 50px #dba551, 0 10px 20px black; transform: scale(1); }
      100% { text-shadow: 0 0 60px #ffd966, 0 0 110px #fddf9e, 0 15px 30px black; transform: scale(1.02); }
    }

    .salam h2 {
      font-size: 2.5rem;
      font-weight: 500;
      color: #f2e3b3;
      text-shadow: 0 2px 10px #2b5a42;
      margin: 5px 0 10px;
      animation: fadeInOut 5s infinite;
    }

    .salam p {
      font-size: 2rem;
      color: #f7eac4;
      background: rgba(0, 0, 0, 0.2);
      display: inline-block;
      padding: 12px 40px;
      border-radius: 60px;
      backdrop-filter: blur(4px);
      border: 1px solid #e3b56a;
      box-shadow: 0 0 30px #dba551;
      margin-top: 15px;
    }

    @keyframes teksBerkilat {
      0% { text-shadow: 0 0 20px #f3b544, 0 0 40px #b57c2a; }
      100% { text-shadow: 0 0 40px #ffd966, 0 0 80px #f1c232, 0 0 120px #ca9e3b; }
    }

    @keyframes fadeInOut {
      0% { opacity: 0.7; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.03); text-shadow: 0 0 15px #ffeeaa; }
      100% { opacity: 0.7; transform: scale(1); }
    }

    /* hiasan tambahan ketupat 3d */
    .ketupat-container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 35px 0 15px;
      flex-wrap: wrap;
    }

    .ketupat {
      width: 80px;
      height: 80px;
      background: #f0d78c;
      transform: rotate(45deg);
      border-radius: 15px 5px 15px 5px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.3), 0 0 0 4px #e3b56a inset;
      animation: putarKetupat 6s infinite linear;
      position: relative;
    }

    .ketupat::after {
      content: "✿";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 2rem;
      color: #b3702a;
      opacity: 0.4;
    }

    .ketupat:nth-child(2) { animation-direction: reverse; animation-duration: 7s; background: #e8cb7e; }
    .ketupat:nth-child(3) { animation-duration: 8s; background: #f5dc9c; }

    @keyframes putarKetupat {
      0% { transform: rotate(45deg) scale(1); }
      50% { transform: rotate(225deg) scale(1.05); }
      100% { transform: rotate(405deg) scale(1); }
    }

    /* footer doa */
    .footer-doa {
      text-align: center;
      margin-top: 40px;
      font-size: 1.6rem;
      font-weight: 300;
      background: rgba(255,215,0,0.1);
      padding: 18px 10px;
      border-radius: 100px;
      border: 1px dashed #ebc27a;
      color: #fff5d6;
      backdrop-filter: blur(5px);
      animation: perlahanLap 8s infinite;
    }

    @keyframes perlahanLap {
      0% { border-color: #ebc27a; background: rgba(255,215,0,0.1); }
      50% { border-color: #ffd966; background: rgba(255,225,140,0.2); box-shadow: 0 0 30px #ebc27a; }
      100% { border-color: #ebc27a; background: rgba(255,215,0,0.1); }
    }

    /* responsive */
    @media (max-width: 700px) {
      .salam h1 { font-size: 2.5rem; }
      .guru-nama { font-size: 3.8rem; }
      .salam h2 { font-size: 1.8rem; }
      .salam p { font-size: 1.5rem; }
      .lampu-container { gap: 15px; }
    }

    @media (max-width: 450px) {
      .guru-nama { font-size: 3rem; letter-spacing: 2px; }
    }
  </style>
</head>
<body>
  <!-- elemen latar belakang bergerak -->
  <div class="background-elements">
    <div class="bulan"></div>
    <div class="awan awan1"></div>
    <div class="awan awan2"></div>
    <div class="awan awan3"></div>
    <!-- beberapa bintang rawak -->
    <div class="bintang" style="top: 15%; left: 10%;"></div>
    <div class="bintang" style="top: 25%; left: 85%; width: 5px; height: 5px;"></div>
    <div class="bintang" style="top: 70%; left: 20%;"></div>
    <div class="bintang" style="top: 50%; left: 95%;"></div>
    <div class="bintang" style="top: 85%; left: 70%;"></div>
    <div class="bintang" style="top: 35%; left: 45%; width: 6px; height: 6px;"></div>
  </div>
  <div class="ketupat-bg"></div>

  <!-- kad utama -->
  <div class="raya-card">
    <!-- lampu bergoyang -->
    <div class="lampu-container">
      <div class="lampu"></div>
      <div class="lampu"></div>
      <div class="lampu"></div>
      <div class="lampu"></div>
      <div class="lampu"></div>
    </div>

    <!-- teks ucapan dengan nama cikgu rizan paling besar -->
    <div class="salam">
      <h1>✨ SELAMAT HARI RAYA ✨</h1>
      <h2>AIDILFITRI 1446H</h2>
      <!-- NAMA CIKGU RIZAN SANGAT BESAR, memenuhi permintaan -->
      <span class="guru-nama">CIKGU RIZAN</span>
      <p>Maaf zahir & batin</p>
    </div>

    <!-- hiasan ketupat berputar -->
    <div class="ketupat-container">
      <div class="ketupat"></div>
      <div class="ketupat"></div>
      <div class="ketupat"></div>
    </div>

    <!-- ayat maaf dan doa (melayu) -->
    <div class="footer-doa">
      🌙 Semoga hari raya ini membawa kebahagiaan, keberkatan, dan kesejahteraan. <br>
      🕊️ Mohon maaf atas segala kesalahan, zahir dan batin. 🕊️
    </div>

    <!-- sedikit tambahan nama lagi supaya lebih peribadi (tapi tetap sederhana) -->
    <div style="text-align: center; margin-top: 20px; font-size: 1.2rem; color: #ffe3a5; opacity: 0.9;">
      — Khas untuk guru tersayang, Cikgu Rizan —
    </div>
  </div>

  <!-- lebih banyak bintang berkelip (dijana secara kecil) -->
  <script>
    (function() {
      // tambah beberapa bintang rawak secara dynamic untuk meriah
      const bg = document.querySelector('.background-elements');
      for (let i = 0; i < 12; i++) {
        const bintang = document.createElement('div');
        bintang.className = 'bintang';
        const size = Math.random() * 5 + 2;
        bintang.style.width = size + 'px';
        bintang.style.height = size + 'px';
        bintang.style.top = Math.random() * 100 + '%';
        bintang.style.left = Math.random() * 100 + '%';
        bintang.style.animationDelay = (Math.random() * 5) + 's';
        bintang.style.animationDuration = (Math.random() * 3 + 2) + 's';
        bg.appendChild(bintang);
      }
    })();
  </script>
</body>
</html>
