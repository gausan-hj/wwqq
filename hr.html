<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Selamat Hari Raya | Cikgu Rizan</title>
  <style>
    /* RESET & ASAS - Mobile First */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #0b2a1f 0%, #1c4e3d 80%, #2e6b52 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px;
      position: relative;
      overflow-x: hidden;
      color: #fef9e8;
      /* Mengurangkan beban animasi pada mobile */
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== LATAR RINGAN (OPTIMISED) ===== */
    .background-elements {
      position: fixed;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Bulan - animasi ringan (transform sahaja) */
    .bulan {
      position: absolute;
      top: 5%;
      right: 5%;
      width: 90px;
      height: 90px;
      background: #f9f3c5;
      border-radius: 50%;
      box-shadow: 0 0 30px #fff9cf;
      animation: bulanApung 5s infinite alternate ease-in-out;
    }

    @keyframes bulanApung {
      0% { transform: translateY(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-8px) scale(1.02); opacity: 1; }
    }

    /* Awan - kurang billangan, pergerakan ringan */
    .awan {
      position: absolute;
      background: rgba(255, 250, 240, 0.18);
      backdrop-filter: blur(4px);
      border-radius: 1000px;
      animation: awanGerak 14s infinite alternate ease-in-out;
    }

    .awan1 {
      width: 200px;
      height: 65px;
      top: 15%;
      left: -60px;
    }

    .awan2 {
      width: 230px;
      height: 80px;
      bottom: 10%;
      right: -50px;
      animation-duration: 18s;
    }

    @keyframes awanGerak {
      0% { transform: translateX(0); }
      100% { transform: translateX(25px); }
    }

    /* Bintang - minimal, hanya opacity */
    .bintang {
      position: absolute;
      background: #fffde7;
      border-radius: 50%;
      width: 4px;
      height: 4px;
      opacity: 0.5;
      box-shadow: 0 0 8px #fff7cf;
      animation: kelipRingan 3s infinite alternate;
    }

    @keyframes kelipRingan {
      0% { opacity: 0.2; }
      100% { opacity: 0.9; }
    }

    /* Corak ketupat latar - gambar statik (tak beranimasi) */
    .ketupat-bg {
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(45deg, rgba(210,180,140,0.04) 0px, rgba(210,180,140,0.04) 25px, transparent 25px, transparent 50px);
      pointer-events: none;
      z-index: 0;
    }

    /* ===== KAD UTAMA ===== */
    .raya-card {
      position: relative;
      z-index: 15;
      width: 100%;
      max-width: 450px; /* selesa untuk phone */
      background: rgba(255, 250, 240, 0.1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 40px 40px 30px 30px;
      box-shadow: 0 20px 40px rgba(0, 20, 10, 0.6), 0 0 0 1.5px rgba(255, 200, 100, 0.4) inset;
      padding: 25px 18px 35px 18px;
      border: 1px solid rgba(255, 230, 150, 0.3);
      /* animasi ringan - tak pakai naik turun besar utk elak lag */
      animation: cardRingan 6s infinite alternate ease-in-out;
    }

    @keyframes cardRingan {
      0% { transform: translateY(0); }
      100% { transform: translateY(-6px); }
    }

    /* ===== LAMPU (lebih kecil, lebih sikit) ===== */
    .lampu-container {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .lampu {
      width: 38px;
      height: 52px;
      background: #eeba5e;
      border-radius: 50% 50% 25% 25%;
      position: relative;
      box-shadow: 0 0 20px #ffb347;
      animation: kelipLampuRingan 2s infinite alternate;
    }

    .lampu::before {
      content: "";
      position: absolute;
      top: -12px;
      left: 11px;
      width: 16px;
      height: 16px;
      background: #997b4b;
      border-radius: 4px 4px 0 0;
    }

    .lampu::after {
      content: "";
      position: absolute;
      bottom: -6px;
      left: 6px;
      width: 26px;
      height: 10px;
      background: #b88a4b;
      border-radius: 8px 8px 0 0;
      filter: blur(2px);
    }

    .lampu:nth-child(2) { background: #f7c56c; animation-delay: 0.3s; }
    .lampu:nth-child(3) { background: #ffd966; animation-delay: 0.6s; }
    .lampu:nth-child(4) { background: #e3aa5a; animation-delay: 0.1s; }

    @keyframes kelipLampuRingan {
      0% { box-shadow: 0 0 8px #fdaa33; opacity: 0.8; }
      100% { box-shadow: 0 0 30px #ffcc66; opacity: 1; }
    }

    /* ===== TEKS ===== */
    .salam {
      text-align: center;
      margin: 10px 0 15px;
    }

    .salam h1 {
      font-size: 2.4rem; /* sederhana mobile */
      font-weight: 700;
      letter-spacing: 1px;
      background: linear-gradient(135deg, #ffeeaa, #fff2c0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 5px;
      animation: kilatTeks 3s infinite alternate;
    }

    @keyframes kilatTeks {
      0% { text-shadow: 0 0 10px #f5b042; }
      100% { text-shadow: 0 0 25px #ffd966, 0 0 40px #f1c232; }
    }

    .salam h2 {
      font-size: 1.7rem;
      font-weight: 500;
      color: #f2e3b3;
      text-shadow: 0 2px 6px #1f4a33;
      margin: 5px 0;
    }

    /* NAMA CIKGU RIZAN SANGAT BESAR tapi tak over sampai pecah layout */
    .guru-nama {
      font-size: 3.8rem;  /* besar pada phone */
      font-weight: 900;
      display: block;
      line-height: 1.2;
      margin: 5px 0 0px;
      text-transform: uppercase;
      letter-spacing: 2px;
      background: linear-gradient(145deg, #ffda7a, #fff2b5, #f9cb6b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 25px #f1c232, 0 0 50px #ffb347, 0 5px 15px rgba(0,0,0,0.4);
      animation: kilatNamaRingan 2.5s infinite alternate;
    }

    @keyframes kilatNamaRingan {
      0% { text-shadow: 0 0 20px #f3b544, 0 0 40px #dba551; }
      100% { text-shadow: 0 0 45px #ffd966, 0 0 80px #fddf9e; }
    }

    .salam p {
      font-size: 1.5rem;
      color: #f7eac4;
      background: rgba(0, 0, 0, 0.2);
      display: inline-block;
      padding: 8px 25px;
      border-radius: 50px;
      backdrop-filter: blur(4px);
      border: 1px solid #e3b56a;
      box-shadow: 0 0 20px #dba551;
      margin: 12px 0 5px;
    }

    /* ===== KETUPAT MINIMAL (hanya 2, putaran ringan) ===== */
    .ketupat-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 15px 0 10px;
    }

    .ketupat {
      width: 60px;
      height: 60px;
      background: #f0d78c;
      transform: rotate(45deg);
      border-radius: 12px 4px 12px 4px;
      box-shadow: 0 5px 12px rgba(0,0,0,0.4), 0 0 0 3px #e3b56a inset;
      animation: putarRingan 8s infinite linear;
      position: relative;
    }

    .ketupat::after {
      content: "✿";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-45deg);
      font-size: 1.5rem;
      color: #b3702a;
      opacity: 0.3;
    }

    .ketupat:nth-child(2) { animation-direction: reverse; animation-duration: 9s; background: #e8cb7e; }

    @keyframes putarRingan {
      0% { transform: rotate(45deg); }
      100% { transform: rotate(405deg); }
    }

    /* ===== FOOTER DOA (ringkas) ===== */
    .footer-doa {
      text-align: center;
      margin-top: 20px;
      font-size: 1.2rem;
      font-weight: 300;
      background: rgba(255, 215, 0, 0.1);
      padding: 14px 8px;
      border-radius: 60px;
      border: 1px dashed #ebc27a;
      color: #fff5d6;
      backdrop-filter: blur(3px);
    }

    /* Nama khas */
    .khas-untuk {
      text-align: center;
      margin-top: 12px;
      font-size: 1rem;
      color: #ffe3a5;
      opacity: 0.9;
    }

    /* ========== MEDIA QUERIES UNTUK KECIL ========== */
    @media (max-width: 380px) {
      .raya-card { padding: 20px 12px; }
      .salam h1 { font-size: 2rem; }
      .guru-nama { font-size: 3rem; }
      .salam h2 { font-size: 1.4rem; }
      .salam p { font-size: 1.2rem; padding: 6px 15px; }
      .lampu { width: 30px; height: 42px; }
    }

    @media (max-width: 320px) {
      .guru-nama { font-size: 2.5rem; }
    }

    /* Mengurangkan jumlah bintang dan elemen berat */
  </style>
</head>
<body>
  <!-- Latar belakang minimalis (optimum) -->
  <div class="background-elements">
    <div class="bulan"></div>
    <div class="awan awan1"></div>
    <div class="awan awan2"></div>
    <!-- Bintang hanya 4 biji -->
    <div class="bintang" style="top: 12%; left: 8%;"></div>
    <div class="bintang" style="top: 22%; left: 88%; width: 5px; height: 5px;"></div>
    <div class="bintang" style="top: 70%; left: 15%;"></div>
    <div class="bintang" style="top: 85%; left: 75%;"></div>
  </div>
  <div class="ketupat-bg"></div>

  <!-- KAD UTAMA -->
  <div class="raya-card">
    <!-- Lampu lebih sedikit dari versi desktop (4 biji) -->
    <div class="lampu-container">
      <div class="lampu"></div>
      <div class="lampu"></div>
      <div class="lampu"></div>
      <div class="lampu"></div>
    </div>

    <!-- Teks dengan CIKGU RIZAN besar -->
    <div class="salam">
      <h1>✨ SELAMAT HARI RAYA ✨</h1>
      <h2>AIDILFITRI 1446H</h2>
      <!-- NAMA BESAR -->
      <span class="guru-nama">CIKGU RIZAN</span>
      <p>Maaf zahir & batin</p>
    </div>

    <!-- Ketupat cuma 2 biji -->
    <div class="ketupat-container">
      <div class="ketupat"></div>
      <div class="ketupat"></div>
    </div>

    <!-- Doa / pesanan -->
    <div class="footer-doa">
      🌙 Semoga hari raya ini membawa kebahagiaan, keberkatan, dan kesejahteraan.
      <br>🕊️ Mohon maaf zahir dan batin. 🕊️
    </div>

    <!-- Baris khas untuk cikgu -->
    <div class="khas-untuk">
      — Khas untuk guru tersayang, Cikgu Rizan —
    </div>
  </div>

  <!-- hanya beberapa bintang tambahan melalui js ringan (tak banyak) -->
  <script>
    (function() {
      // Menambah beberapa bintang lagi tetapi dengan bilangan kecil dan terkawal
      const bg = document.querySelector('.background-elements');
      // Cuma tambah 3 bintang lagi supaya tak berat
      for (let i = 0; i < 3; i++) {
        const b = document.createElement('div');
        b.className = 'bintang';
        b.style.top = Math.random() * 90 + '%';
        b.style.left = Math.random() * 90 + '%';
        b.style.width = (Math.random() * 4 + 2) + 'px';
        b.style.height = b.style.width;
        b.style.animationDelay = (Math.random() * 4) + 's';
        b.style.animationDuration = (Math.random() * 3 + 2) + 's';
        bg.appendChild(b);
      }
    })();
  </script>
</body>
</html>
