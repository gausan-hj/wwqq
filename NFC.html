<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC打卡 · 卡片飞入顶替</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主容器 */
        .dashboard {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            display: flex;
            gap: 24px;
        }

        /* 左侧 - NFC打卡区域 */
        .left-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 右侧面板 */
        .right-panel {
            width: 400px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 28px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: visible;
        }

        /* 标题 */
        .title-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .title-section h1 {
            color: #2d3748;
            font-size: 2.2rem;
            font-weight: 600;
        }

        .title-section .sub {
            color: #4a5568;
            background: rgba(255, 255, 255, 0.8);
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }

        /* NFC卡片容器 */
        .nfc-card-container {
            position: relative;
            width: 360px;
            height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        /* 圆圈 - 白色变橙色 */
        .circle-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        /* 空心圆 - 白色变橙色 */
        .hollow-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            background: transparent;
            box-shadow: 0 0 0 2px rgba(45, 55, 72, 0.1), 0 20px 40px -10px rgba(0, 0, 0, 0.2);
            position: relative;
            transition: all 0.3s ease;
        }

        /* 跳动动画 - 白色变橙色 */
        .circle-pulse {
            animation: circleScale 2s ease-in-out infinite;
        }

        @keyframes circleScale {
            0%, 100% { 
                transform: scale(1); 
                border-color: white;
                box-shadow: 0 0 0 2px rgba(45, 55, 72, 0.1), 0 20px 40px -10px rgba(0, 0, 0, 0.2);
            }
            50% { 
                transform: scale(1.1); 
                border-color: #ff8c00;
                box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
            }
        }

        /* 内圈虚线 */
        .hollow-circle::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.8);
        }

        /* 对勾容器 */
        .check-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .check-container.show {
            opacity: 1;
        }

        /* 对勾SVG动画 */
        .checkmark-svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 4px 8px rgba(76, 175, 80, 0.3));
        }

        .checkmark-circle {
            stroke: #4CAF50;
            stroke-width: 4;
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            fill: none;
            animation: drawCircle 0.5s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark-path {
            stroke: #4CAF50;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            fill: none;
            animation: drawCheck 0.4s cubic-bezier(0.65, 0, 0.45, 1) 0.3s forwards;
        }

        @keyframes drawCircle {
            100% { stroke-dashoffset: 0; }
        }

        @keyframes drawCheck {
            100% { stroke-dashoffset: 0; }
        }

        /* 状态文字 */
        .status-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #2d3748;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            white-space: nowrap;
            z-index: 5;
            transition: all 0.3s;
        }

        .status-text.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 个人资讯卡片 - 将飞入右侧 */
        .info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: white;
            border-radius: 40px;
            padding: 28px;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.3);
            border: 1px solid #e2e8f0;
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
        }

        .info-card.show {
            opacity: 1;
            pointer-events: auto;
        }

        .info-card.fly-to-target {
            transform: translate(calc(50vw - 200px), -50%) scale(0.2);
            opacity: 0.5;
        }

        .info-card.fly-down {
            transform: translate(calc(50vw - 200px), 200px) scale(0.1);
            opacity: 0;
        }

        /* 资讯头部 */
        .info-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .info-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #2d3748, #4a5568);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .info-title h2 {
            color: #2d3748;
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .info-title p {
            color: #718096;
            font-size: 1rem;
            margin-top: 4px;
        }

        /* 资讯详情 */
        .info-details {
            background: #f7fafc;
            border-radius: 28px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            color: #718096;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .detail-value {
            color: #2d3748;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .badge-orange {
            background: #ff8c00;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* 测试按钮 */
        .test-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 1px solid #2d3748;
            color: #2d3748;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 30;
        }

        .test-btn:hover {
            background: #2d3748;
            color: white;
        }

        /* 历史记录样式 */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px 20px 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .history-header h2 {
            color: #2d3748;
            font-size: 1.5rem;
        }

        .history-header .count {
            background: white;
            color: #2d3748;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            position: relative;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #edf2f7;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }

        .history-item {
            background: white;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.3s ease;
            position: relative;
            border: 1px solid #e2e8f0;
        }

        /* 新记录出现动画 */
        .history-item.new-item {
            animation: appearFromTop 0.5s ease;
        }

        @keyframes appearFromTop {
            0% {
                transform: translateY(-20px);
                opacity: 0;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* 被顶掉的记录动画 */
        .history-item.pushed-down {
            animation: pushDown 0.3s ease forwards;
        }

        @keyframes pushDown {
            0% {
                transform: translateY(0);
            }
            100% {
                transform: translateY(calc(100% + 12px));
            }
        }

        .history-avatar {
            width: 52px;
            height: 52px;
            background: #2d3748;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            color: #2d3748;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .history-meta {
            display: flex;
            gap: 12px;
            color: #718096;
            font-size: 0.85rem;
        }

        .history-meta span {
            background: #f7fafc;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .history-time {
            color: #ff8c00;
            font-weight: 600;
        }

        .stats-footer {
            margin-top: 20px;
            padding: 16px 12px 8px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            color: #2d3748;
        }

        .stats-footer .today-count {
            background: white;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
        }

        /* 飞入目标位置 */
        .fly-target {
            position: absolute;
            top: 100px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255, 140, 0, 0.2);
            border: 2px dashed #ff8c00;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
        }

        .fly-target.show {
            opacity: 1;
            animation: targetPulse 0.5s infinite;
        }

        @keyframes targetPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 飞入路径提示 */
        .flight-path {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .flight-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 2px;
            background: #ff8c00;
            box-shadow: 0 0 10px #ff8c00;
            border-radius: 50%;
            animation: flyLine 0.8s ease-out forwards;
        }

        @keyframes flyLine {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(calc(50vw - 200px), 100px) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 飞入路径容器 -->
    <div class="flight-path" id="flightPath"></div>

    <div class="dashboard">
        <!-- 左侧：NFC打卡区域 -->
        <div class="left-panel">
            <div class="title-section">
                <h1>NFC 考勤系统</h1>
                <div class="sub">⚡ 靠近卡片自动打卡</div>
            </div>

            <!-- NFC卡片容器 -->
            <div class="nfc-card-container">
                <!-- 圆圈 - 白色变橙色 -->
                <div class="circle-wrapper" id="circleWrapper">
                    <div class="hollow-circle circle-pulse" id="hollowCircle"></div>
                </div>

                <!-- 对勾容器 -->
                <div class="check-container" id="checkContainer">
                    <svg class="checkmark-svg" viewBox="0 0 52 52">
                        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark-path" fill="none" d="M14 27l7 7 16-16"/>
                    </svg>
                </div>

                <!-- 状态文字 -->
                <div class="status-text" id="statusText">⚪ 等待NFC卡片...</div>

                <!-- 个人资讯卡片 -->
                <div class="info-card" id="infoCard">
                    <div class="info-header">
                        <div class="info-avatar" id="infoAvatar">👨‍💻</div>
                        <div class="info-title">
                            <h2 id="infoName">张明远</h2>
                            <p id="infoDept">研发中心 · 架构组</p>
                        </div>
                    </div>
                    <div class="info-details">
                        <div class="detail-item">
                            <div class="detail-label">工号</div>
                            <div class="detail-value" id="infoId">HW-2304</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">打卡时间</div>
                            <div class="detail-value" id="infoTime">08:32</div>
                        </div>
                        <span class="badge-orange" id="infoStatus">已打卡</span>
                    </div>
                </div>

                <!-- 测试按钮 -->
                <button class="test-btn" id="testBtn">🔄 模拟打卡</button>
            </div>
        </div>

        <!-- 右侧：历史记录 -->
        <div class="right-panel">
            <!-- 飞入目标 -->
            <div class="fly-target" id="flyTarget">📥</div>

            <div class="history-header">
                <h2>📋 今日打卡</h2>
                <div class="count" id="todayCount">2 人</div>
            </div>

            <div class="history-list" id="historyList">
                <!-- 示例记录 -->
                <div class="history-item" id="history1">
                    <div class="history-avatar">👩‍🎨</div>
                    <div class="history-info">
                        <div class="history-name">李思睿</div>
                        <div class="history-meta">
                            <span>产品部</span>
                            <span>📱NFC</span>
                        </div>
                    </div>
                    <div class="history-time">08:45</div>
                </div>
                <div class="history-item" id="history2">
                    <div class="history-avatar">👨‍🔧</div>
                    <div class="history-info">
                        <div class="history-name">王华强</div>
                        <div class="history-meta">
                            <span>测试部</span>
                            <span>📱NFC</span>
                        </div>
                    </div>
                    <div class="history-time">08:30</div>
                </div>
            </div>

            <div class="stats-footer">
                <span>📊 累计</span>
                <span class="today-count" id="totalCountSpan">2 次</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM元素
            const circleWrapper = document.getElementById('circleWrapper');
            const hollowCircle = document.getElementById('hollowCircle');
            const checkContainer = document.getElementById('checkContainer');
            const statusText = document.getElementById('statusText');
            const infoCard = document.getElementById('infoCard');
            const flyTarget = document.getElementById('flyTarget');
            const flightPath = document.getElementById('flightPath');
            const testBtn = document.getElementById('testBtn');
            const historyList = document.getElementById('historyList');
            const history1 = document.getElementById('history1');
            const history2 = document.getElementById('history2');
            const todayCount = document.getElementById('todayCount');
            const totalCountSpan = document.getElementById('totalCountSpan');
            
            // 资讯元素
            const infoAvatar = document.getElementById('infoAvatar');
            const infoName = document.getElementById('infoName');
            const infoDept = document.getElementById('infoDept');
            const infoId = document.getElementById('infoId');
            const infoTime = document.getElementById('infoTime');

            // 状态
            let nfcReader = null;
            let isScanning = false;
            let timeoutId = null;
            let checkTimeoutId = null;
            let recordCount = 2;

            // 员工数据库
            const staffDatabase = {
                '04:12:34:56:78:9A:BC': {
                    name: '张明远',
                    dept: '研发中心 · 架构组',
                    id: 'HW-2304',
                    avatar: '👨‍💻'
                },
                'test-user-1': {
                    name: '赵测试',
                    dept: '测试部 · 功能组',
                    id: 'TEST-001',
                    avatar: '🧪'
                },
                'test-user-2': {
                    name: '钱试用',
                    dept: '质量部 · 质检',
                    id: 'TEST-002',
                    avatar: '🔬'
                },
                'test-user-3': {
                    name: '孙实验',
                    dept: '实验室 · 研发',
                    id: 'TEST-003',
                    avatar: '⚗️'
                }
            };

            // 获取当前时间
            function getCurrentTime() {
                const now = new Date();
                return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            }

            // 查找员工
            function findEmployeeByNfcId(nfcId) {
                return staffDatabase[nfcId.trim()] || staffDatabase['test-user-1'];
            }

            // 添加新记录
            function addNewRecord(employee) {
                recordCount++;
                todayCount.textContent = `${recordCount} 人`;
                totalCountSpan.textContent = `${recordCount} 次`;

                // 获取第一条记录（将被顶掉）
                const firstItem = historyList.firstElementChild;
                
                // 创建新记录元素
                const newItem = document.createElement('div');
                newItem.className = 'history-item new-item';
                newItem.innerHTML = `
                    <div class="history-avatar">${employee.avatar}</div>
                    <div class="history-info">
                        <div class="history-name">${employee.name}</div>
                        <div class="history-meta">
                            <span>${employee.dept.split('·')[0].trim()}</span>
                            <span>📱NFC</span>
                        </div>
                    </div>
                    <div class="history-time">${getCurrentTime()}</div>
                `;

                // 给第一条记录添加被顶掉的动画
                if (firstItem) {
                    firstItem.classList.add('pushed-down');
                    
                    // 动画结束后移除旧记录，插入新记录
                    setTimeout(() => {
                        if (firstItem.parentNode) {
                            firstItem.remove();
                        }
                        // 在列表顶部插入新记录
                        historyList.insertBefore(newItem, historyList.firstChild);
                        
                        // 如果超过3条，删除最后一条
                        if (historyList.children.length > 3) {
                            historyList.lastElementChild.remove();
                            recordCount--;
                            todayCount.textContent = `${recordCount} 人`;
                            totalCountSpan.textContent = `${recordCount} 次`;
                        }
                    }, 300);
                } else {
                    historyList.insertBefore(newItem, historyList.firstChild);
                }
            }

            // 重置对勾动画
            function resetCheckAnimation() {
                const svg = checkContainer.querySelector('svg');
                const newSvg = svg.cloneNode(true);
                checkContainer.replaceChild(newSvg, svg);
            }

            // 显示飞入路径
            function showFlightPath() {
                const line = document.createElement('div');
                line.className = 'flight-line';
                flightPath.appendChild(line);
                
                setTimeout(() => {
                    line.remove();
                }, 800);
            }

            // 打卡成功动画
            function showPunchSuccess(employee) {
                // 清除之前的定时器
                if (timeoutId) clearTimeout(timeoutId);
                if (checkTimeoutId) clearTimeout(checkTimeoutId);

                // 1. 圆圈停止跳动
                hollowCircle.classList.remove('circle-pulse');
                
                // 2. 隐藏状态文字
                statusText.classList.add('hidden');
                
                // 3. 更新个人资讯
                infoAvatar.textContent = employee.avatar;
                infoName.textContent = employee.name;
                infoDept.textContent = employee.dept;
                infoId.textContent = employee.id;
                infoTime.textContent = getCurrentTime();
                
                // 4. 显示个人资讯卡片
                infoCard.classList.add('show');
                
                // 5. 显示飞入目标
                flyTarget.classList.add('show');
                
                // 6. 1.5秒后卡片飞向目标
                timeoutId = setTimeout(() => {
                    // 显示飞入路径
                    showFlightPath();
                    
                    // 卡片飞向目标
                    infoCard.classList.add('fly-to-target');
                    
                    // 0.3秒后（飞到目标）再飞下去
                    setTimeout(() => {
                        infoCard.classList.add('fly-down');
                        
                        // 0.2秒后（飞下去完成）添加新记录
                        setTimeout(() => {
                            // 隐藏卡片
                            infoCard.classList.remove('show', 'fly-to-target', 'fly-down');
                            
                            // 隐藏飞入目标
                            flyTarget.classList.remove('show');
                            
                            // 添加新记录（顶掉旧记录）
                            addNewRecord(employee);
                            
                            // 重置对勾动画
                            resetCheckAnimation();
                            
                            // 显示对勾
                            checkContainer.classList.add('show');
                            
                            // 1.5秒后恢复待机
                            checkTimeoutId = setTimeout(() => {
                                // 隐藏对勾
                                checkContainer.classList.remove('show');
                                
                                // 恢复圆圈跳动
                                hollowCircle.classList.add('circle-pulse');
                                
                                // 显示状态文字
                                statusText.classList.remove('hidden');
                                statusText.innerHTML = '⚪ 等待NFC卡片...';
                                
                                timeoutId = null;
                                checkTimeoutId = null;
                            }, 1500);
                            
                        }, 200);
                    }, 300);
                    
                }, 1500);
            }

            // 初始化NFC
            async function initNfc() {
                if (!('NDEFReader' in window)) {
                    statusText.innerHTML = '❌ 浏览器不支持NFC';
                    return;
                }

                try {
                    nfcReader = new NDEFReader();
                    
                    nfcReader.addEventListener('reading', event => {
                        const nfcId = event.serialNumber || '未知ID';
                        const employee = findEmployeeByNfcId(nfcId);
                        showPunchSuccess(employee);
                    });

                    await nfcReader.scan();
                    isScanning = true;
                    statusText.innerHTML = '🟢 持续待机中...';
                    
                } catch (error) {
                    statusText.innerHTML = '❌ NFC启动失败';
                }
            }

            // 测试打卡
            function handleTestPunch() {
                const testUsers = ['test-user-1', 'test-user-2', 'test-user-3'];
                const randomUser = testUsers[Math.floor(Math.random() * testUsers.length)];
                const employee = staffDatabase[randomUser];
                showPunchSuccess(employee);
            }

            // 事件监听
            testBtn.addEventListener('click', handleTestPunch);

            // 初始化
            window.addEventListener('load', () => {
                initNfc();
            });

            // 清理
            window.addEventListener('beforeunload', async () => {
                if (isScanning && nfcReader) {
                    try { await nfcReader.stop(); } catch (e) {}
                }
                if (timeoutId) clearTimeout(timeoutId);
                if (checkTimeoutId) clearTimeout(checkTimeoutId);
            });
        })();
    </script>
</body>
</html>
