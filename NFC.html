<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC打卡 · 发光圆圈包裹</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            display: flex;
            gap: 24px;
        }

        /* 左侧 - NFC打卡区域 */
        .left-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 右侧面板 */
        .right-panel {
            width: 450px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 60px;
            padding: 28px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.8);
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .title-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .title-section h1 {
            color: #2d3748;
            font-size: 2.2rem;
            font-weight: 600;
        }

        .title-section .sub {
            color: #4a5568;
            background: rgba(255, 255, 255, 0.8);
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid #e2e8f0;
        }

        /* NFC卡片容器 */
        .nfc-card-container {
            position: relative;
            width: 360px;
            height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        /* 圆圈 - 跳动 */
        .circle-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .hollow-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid white;
            background: transparent;
            box-shadow: 0 0 0 2px rgba(45, 55, 72, 0.1), 0 20px 40px -10px rgba(0, 0, 0, 0.2);
            position: relative;
            transition: all 0.3s ease;
        }

        .circle-pulse {
            animation: circleScale 2s ease-in-out infinite;
        }

        @keyframes circleScale {
            0%, 100% { 
                transform: scale(1); 
                border-color: white;
            }
            50% { 
                transform: scale(1.1); 
                border-color: #ff8c00;
                box-shadow: 0 0 20px rgba(255, 140, 0, 0.3);
            }
        }

        .hollow-circle::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.8);
        }

        /* 对勾容器 */
        .check-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .check-container.show {
            opacity: 1;
        }

        .checkmark-svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 4px 8px rgba(76, 175, 80, 0.3));
        }

        .checkmark-circle {
            stroke: #4CAF50;
            stroke-width: 4;
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            fill: none;
            animation: drawCircle 0.5s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark-path {
            stroke: #4CAF50;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            fill: none;
            animation: drawCheck 0.4s cubic-bezier(0.65, 0, 0.45, 1) 0.3s forwards;
        }

        @keyframes drawCircle {
            100% { stroke-dashoffset: 0; }
        }

        @keyframes drawCheck {
            100% { stroke-dashoffset: 0; }
        }

        /* 状态文字 */
        .status-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #2d3748;
            font-size: 1.1rem;
            background: rgba(255, 255, 255, 0.9);
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            white-space: nowrap;
            z-index: 5;
            transition: all 0.3s;
        }

        .status-text.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 发光圆圈 - 包裹个人资讯卡片 */
        .glow-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: transparent;
            border: 4px solid #ff8c00;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.5);
            z-index: 19;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            animation: glowRotate 3s linear infinite;
        }

        .glow-circle.show {
            opacity: 1;
        }

        .glow-circle::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 140, 0, 0.6);
        }

        @keyframes glowRotate {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* 个人资讯卡片 */
        .info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: white;
            border-radius: 40px;
            padding: 28px;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.3);
            border: 1px solid #e2e8f0;
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
        }

        .info-card.show {
            opacity: 1;
            pointer-events: auto;
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .info-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #2d3748, #4a5568);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .info-title h2 {
            color: #2d3748;
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .info-title p {
            color: #718096;
            font-size: 1rem;
            margin-top: 4px;
        }

        .info-details {
            background: #f7fafc;
            border-radius: 28px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            color: #718096;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .detail-value {
            color: #2d3748;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .badge-orange {
            background: #ff8c00;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* 测试按钮 */
        .test-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 1px solid #2d3748;
            color: #2d3748;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 30;
        }

        .test-btn:hover {
            background: #2d3748;
            color: white;
        }

        /* 历史记录样式 */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px 20px 12px;
            border-bottom: 1px solid #e2e8f0;
        }

        .history-header h2 {
            color: #2d3748;
            font-size: 1.5rem;
        }

        .count {
            background: white;
            color: #2d3748;
            padding: 4px 12px;
            border-radius: 40px;
            border: 1px solid #e2e8f0;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 400px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #edf2f7;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 10px;
        }

        .history-item {
            background: white;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #e2e8f0;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-avatar {
            width: 52px;
            height: 52px;
            background: #2d3748;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            color: #2d3748;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .history-meta {
            display: flex;
            gap: 12px;
            color: #718096;
            font-size: 0.85rem;
        }

        .history-meta span {
            background: #f7fafc;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .history-time {
            color: #ff8c00;
            font-weight: 600;
        }

        .stats-footer {
            margin-top: 20px;
            padding: 16px 12px 8px;
            border-top: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            color: #2d3748;
        }

        .stats-footer .today-count {
            background: white;
            padding: 6px 16px;
            border-radius: 30px;
            border: 1px solid #e2e8f0;
        }

        /* 飞入目标 */
        .fly-target {
            position: absolute;
            top: 80px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255, 140, 0, 0.2);
            border: 2px dashed #ff8c00;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
        }

        .fly-target.show {
            opacity: 1;
            animation: targetPulse 0.5s infinite;
        }

        @keyframes targetPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 飞入路径 */
        .flight-path {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .flight-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 2px;
            background: #ff8c00;
            box-shadow: 0 0 10px #ff8c00;
            border-radius: 50%;
            animation: flyLine 0.8s ease-out forwards;
        }

        @keyframes flyLine {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(calc(50vw - 200px), -150px) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 飞入路径容器 -->
    <div class="flight-path" id="flightPath"></div>

    <div class="dashboard">
        <!-- 左侧：NFC打卡区域 -->
        <div class="left-panel">
            <div class="title-section">
                <h1>NFC 考勤系统</h1>
                <div class="sub">⚡ 靠近卡片自动打卡</div>
            </div>

            <!-- NFC卡片容器 -->
            <div class="nfc-card-container">
                <!-- 圆圈 - 跳动 -->
                <div class="circle-wrapper" id="circleWrapper">
                    <div class="hollow-circle circle-pulse" id="hollowCircle"></div>
                </div>

                <!-- 对勾容器 -->
                <div class="check-container" id="checkContainer">
                    <svg class="checkmark-svg" viewBox="0 0 52 52">
                        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark-path" fill="none" d="M14 27l7 7 16-16"/>
                    </svg>
                </div>

                <!-- 发光圆圈 - 包裹个人资讯 -->
                <div class="glow-circle" id="glowCircle"></div>

                <!-- 个人资讯卡片 -->
                <div class="info-card" id="infoCard">
                    <div class="info-header">
                        <div class="info-avatar" id="infoAvatar">👨‍💻</div>
                        <div class="info-title">
                            <h2 id="infoName">张明远</h2>
                            <p id="infoDept">研发中心 · 架构组</p>
                        </div>
                    </div>
                    <div class="info-details">
                        <div class="detail-item">
                            <div class="detail-label">工号</div>
                            <div class="detail-value" id="infoId">HW-2304</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">打卡时间</div>
                            <div class="detail-value" id="infoTime">08:32</div>
                        </div>
                        <span class="badge-orange" id="infoStatus">已打卡</span>
                    </div>
                </div>

                <!-- 状态文字 -->
                <div class="status-text" id="statusText">⚪ 等待NFC卡片...</div>

                <!-- 测试按钮 -->
                <button class="test-btn" id="testBtn">🔄 模拟打卡</button>
            </div>
        </div>

        <!-- 右侧：历史记录 -->
        <div class="right-panel">
            <!-- 飞入目标 -->
            <div class="fly-target" id="flyTarget">📥</div>

            <div class="history-header">
                <h2>📋 今日打卡</h2>
                <div class="count" id="todayCount">0 人</div>
            </div>

            <div class="history-list" id="historyList">
                <!-- 初始为空，等待打卡 -->
            </div>

            <div class="stats-footer">
                <span>📊 累计</span>
                <span class="today-count" id="totalCountSpan">0 次</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM元素
            const circleWrapper = document.getElementById('circleWrapper');
            const hollowCircle = document.getElementById('hollowCircle');
            const checkContainer = document.getElementById('checkContainer');
            const glowCircle = document.getElementById('glowCircle');
            const statusText = document.getElementById('statusText');
            const infoCard = document.getElementById('infoCard');
            const flyTarget = document.getElementById('flyTarget');
            const flightPath = document.getElementById('flightPath');
            const testBtn = document.getElementById('testBtn');
            const historyList = document.getElementById('historyList');
            const todayCount = document.getElementById('todayCount');
            const totalCountSpan = document.getElementById('totalCountSpan');
            
            // 资讯元素
            const infoAvatar = document.getElementById('infoAvatar');
            const infoName = document.getElementById('infoName');
            const infoDept = document.getElementById('infoDept');
            const infoId = document.getElementById('infoId');
            const infoTime = document.getElementById('infoTime');

            // 状态
            let nfcReader = null;
            let isScanning = false;
            let timeoutId = null;
            let checkTimeoutId = null;
            let recordCount = 0;
            let historyRecords = [];

            // 员工数据库
            const staffDatabase = [
                {
                    name: '张明远',
                    dept: '研发中心 · 架构组',
                    id: 'HW-2304',
                    avatar: '👨‍💻'
                },
                {
                    name: '李思睿',
                    dept: '产品部 · 设计组',
                    id: 'HW-1789',
                    avatar: '👩‍🎨'
                },
                {
                    name: '王华强',
                    dept: '测试部 · 自动化',
                    id: 'HW-5521',
                    avatar: '👨‍🔧'
                },
                {
                    name: '赵一鸣',
                    dept: '销售部 · 华东区',
                    id: 'HW-3321',
                    avatar: '👨‍💼'
                },
                {
                    name: '孙小美',
                    dept: '人事部 · 招聘组',
                    id: 'HW-7788',
                    avatar: '👩‍💼'
                },
                {
                    name: '周检测',
                    dept: '质量部 · 检测组',
                    id: 'TEST-006',
                    avatar: '🔍'
                },
                {
                    name: '吴验证',
                    dept: '验证部 · 流程组',
                    id: 'TEST-007',
                    avatar: '📋'
                },
                {
                    name: '郑确认',
                    dept: '确认部 · 验收组',
                    id: 'TEST-008',
                    avatar: '✅'
                }
            ];

            // 获取当前时间
            function getCurrentTime() {
                const now = new Date();
                return `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            }

            // 显示飞入路径
            function showFlightPath() {
                const line = document.createElement('div');
                line.className = 'flight-line';
                flightPath.appendChild(line);
                
                setTimeout(() => {
                    line.remove();
                }, 800);
            }

            // 重置对勾动画
            function resetCheckAnimation() {
                const svg = checkContainer.querySelector('svg');
                const newSvg = svg.cloneNode(true);
                checkContainer.replaceChild(newSvg, svg);
            }

            // 添加新记录到历史列表
            function addHistoryRecord(employee) {
                const time = getCurrentTime();
                
                // 创建新记录对象
                const newRecord = {
                    id: Date.now(),
                    name: employee.name,
                    dept: employee.dept.split('·')[0].trim(),
                    avatar: employee.avatar,
                    time: time
                };
                
                // 添加到数组开头
                historyRecords.unshift(newRecord);
                
                // 重新渲染列表
                renderHistoryList();
                
                // 更新计数
                recordCount = historyRecords.length;
                todayCount.textContent = `${recordCount} 人`;
                totalCountSpan.textContent = `${recordCount} 次`;
            }

            // 渲染历史列表
            function renderHistoryList() {
                if (historyRecords.length === 0) {
                    historyList.innerHTML = '<div class="history-item" style="opacity: 0.6;"><div class="history-avatar">⏳</div><div class="history-info"><div class="history-name">等待打卡...</div><div class="history-meta"><span>--</span></div></div><div class="history-time">--:--</div></div>';
                    return;
                }

                let html = '';
                historyRecords.forEach(record => {
                    html += `
                        <div class="history-item">
                            <div class="history-avatar">${record.avatar}</div>
                            <div class="history-info">
                                <div class="history-name">${record.name}</div>
                                <div class="history-meta">
                                    <span>${record.dept}</span>
                                    <span>📱NFC</span>
                                </div>
                            </div>
                            <div class="history-time">${record.time}</div>
                        </div>
                    `;
                });
                historyList.innerHTML = html;
            }

            // 打卡成功动画
            function showPunchSuccess() {
                // 随机选择一个员工
                const employee = staffDatabase[Math.floor(Math.random() * staffDatabase.length)];

                // 清除之前的定时器
                if (timeoutId) clearTimeout(timeoutId);
                if (checkTimeoutId) clearTimeout(checkTimeoutId);

                // 1. 圆圈停止跳动
                hollowCircle.classList.remove('circle-pulse');
                
                // 2. 隐藏状态文字
                statusText.classList.add('hidden');
                
                // 3. 更新个人资讯
                infoAvatar.textContent = employee.avatar;
                infoName.textContent = employee.name;
                infoDept.textContent = employee.dept;
                infoId.textContent = employee.id;
                infoTime.textContent = getCurrentTime();
                
                // 4. 显示个人资讯卡片和发光圆圈
                infoCard.classList.add('show');
                glowCircle.classList.add('show');
                
                // 5. 显示飞入目标
                flyTarget.classList.add('show');
                
                // 6. 1.5秒后卡片飞向目标
                timeoutId = setTimeout(() => {
                    // 显示飞入路径
                    showFlightPath();
                    
                    // 添加记录到历史列表
                    addHistoryRecord(employee);
                    
                    // 隐藏卡片和发光圆圈
                    infoCard.classList.remove('show');
                    glowCircle.classList.remove('show');
                    flyTarget.classList.remove('show');
                    
                    // 重置对勾动画
                    resetCheckAnimation();
                    
                    // 显示对勾
                    checkContainer.classList.add('show');
                    
                    // 1.5秒后恢复待机
                    checkTimeoutId = setTimeout(() => {
                        // 隐藏对勾
                        checkContainer.classList.remove('show');
                        
                        // 恢复圆圈跳动
                        hollowCircle.classList.add('circle-pulse');
                        
                        // 显示状态文字
                        statusText.classList.remove('hidden');
                        statusText.innerHTML = '⚪ 等待NFC卡片...';
                        
                        timeoutId = null;
                        checkTimeoutId = null;
                    }, 1500);
                    
                }, 1500);
            }

            // 初始化NFC
            async function initNfc() {
                if (!('NDEFReader' in window)) {
                    statusText.innerHTML = '❌ 浏览器不支持NFC';
                    return;
                }

                try {
                    nfcReader = new NDEFReader();
                    
                    nfcReader.addEventListener('reading', event => {
                        showPunchSuccess();
                    });

                    await nfcReader.scan();
                    isScanning = true;
                    statusText.innerHTML = '🟢 持续待机中...';
                    
                } catch (error) {
                    statusText.innerHTML = '❌ NFC启动失败';
                }
            }

            // 测试打卡
            function handleTestPunch() {
                showPunchSuccess();
            }

            // 事件监听
            testBtn.addEventListener('click', handleTestPunch);

            // 初始化
            window.addEventListener('load', () => {
                initNfc();
                
                // 添加一些示例记录
                setTimeout(() => {
                    if (historyRecords.length === 0) {
                        addHistoryRecord(staffDatabase[0]);
                        setTimeout(() => addHistoryRecord(staffDatabase[1]), 300);
                        setTimeout(() => addHistoryRecord(staffDatabase[2]), 600);
                    }
                }, 1000);
            });

            // 清理
            window.addEventListener('beforeunload', async () => {
                if (isScanning && nfcReader) {
                    try { await nfcReader.stop(); } catch (e) {}
                }
                if (timeoutId) clearTimeout(timeoutId);
                if (checkTimeoutId) clearTimeout(checkTimeoutId);
            });
        })();
    </script>
</body>
</html>
