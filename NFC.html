<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>校园NFC打卡 · 横屏动效版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(165deg, #1e3c5c 0%, #0f2a44 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        /* 横屏主容器 - 16:9 比例 */
        .landscape-container {
            max-width: 980px;
            width: 100%;
            aspect-ratio: 16 / 9;
            background: rgba(245, 247, 250, 0.95);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 48px;
            padding: 24px 32px;
            box-shadow: 0 30px 50px -20px rgba(0, 0, 0, 0.6), 
                        0 0 0 1px rgba(255, 255, 255, 0.4) inset;
            border: 1px solid rgba(255,255,255,0.7);
            display: flex;
            flex-direction: column;
        }

        /* 头部 - 学校标识 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .school-area {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .school-logo {
            background: #c72a2a;
            width: 46px;
            height: 46px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 26px;
            font-weight: 600;
            box-shadow: 0 8px 14px -8px #7b1e1e;
            border: 2px solid #ffd966;
        }

        .school-name {
            font-size: 24px;
            font-weight: 700;
            color: #0a2a44;
            letter-spacing: -0.3px;
        }

        .school-name span {
            font-size: 16px;
            font-weight: 500;
            color: #4a627a;
            margin-left: 10px;
        }

        .date-badge {
            background: #ffffffcc;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: 600;
            color: #1e3c5c;
            font-size: 16px;
            border: 1px solid white;
            box-shadow: 0 4px 10px -6px black;
        }

        /* 主要内容区 - 左右布局 */
        .main-content {
            flex: 1;
            display: flex;
            gap: 28px;
            min-height: 0;  /* 防止flex溢出 */
        }

        /* 左侧：空心圆 + 打卡信息 */
        .left-panel {
            flex: 1.2;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 42px;
            padding: 16px 20px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 10px 25px -15px #00000030;
        }

        /* 空心圆容器 */
        .circle-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 5px 0 10px 0;
            position: relative;
        }

        /* 基础空心圆 */
        .hollow-circle {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: transparent;
            border: 5px solid #2c4c74;
            box-shadow: 0 0 0 2px rgba(255,255,255,0.5), inset 0 0 0 2px rgba(255,255,255,0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            z-index: 5;
        }

        /* 拍卡动画：放大缩小 + 变色 */
        .hollow-circle.scan-success {
            animation: popPulse 0.6s ease-out forwards;
            border-color: #ffd966;
            border-width: 6px;
            box-shadow: 0 0 40px #ffd966, inset 0 0 20px #ffd966, 0 0 0 3px white;
        }

        @keyframes popPulse {
            0% { transform: scale(1); border-color: #2c4c74; border-width: 5px; }
            30% { transform: scale(1.25); border-color: #ffb347; border-width: 8px; }
            60% { transform: scale(0.98); border-color: #ffd966; border-width: 7px; }
            100% { transform: scale(1.05); border-color: #ffd966; border-width: 6px; }
        }

        /* 扫描中脉冲 */
        .hollow-circle.scanning {
            animation: scanningPulse 1.2s infinite ease-in-out;
            border-color: #90b8e0;
        }

        @keyframes scanningPulse {
            0% { transform: scale(1); border-width: 5px; box-shadow: 0 0 20px #4a7db5; }
            50% { transform: scale(1.1); border-width: 7px; box-shadow: 0 0 45px #4a7db5; }
            100% { transform: scale(1); border-width: 5px; box-shadow: 0 0 20px #4a7db5; }
        }

        /* 打卡信息卡片 (动画弹出) */
        .user-info-card {
            background: white;
            border-radius: 36px;
            padding: 20px 24px;
            width: 100%;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.9);
            box-shadow: 0 15px 30px -18px #1a2e44;
            transform-origin: top center;
            animation: slideDown 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            border: 2px solid #ffd966;
        }

        @keyframes slideDown {
            0% { opacity: 0; transform: translateY(-20px) scale(0.9); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .student-row {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .student-avatar {
            width: 70px;
            height: 70px;
            border-radius: 30px;
            background: #ffd966;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            color: #1e3c5c;
            border: 3px solid white;
            box-shadow: 0 8px 0 #b38b40;
        }

        .student-details {
            flex: 1;
        }

        .student-name {
            font-size: 26px;
            font-weight: 700;
            color: #0b2b44;
            line-height: 1.2;
        }

        .student-class {
            font-size: 18px;
            color: #5a6f8c;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .student-class span {
            background: #eef3f9;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #1e3c5c;
        }

        .datetime-detail {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 2px dashed #cbd5e1;
            display: flex;
            justify-content: space-between;
            color: #2f4a6e;
            font-weight: 500;
            font-size: 16px;
        }

        /* 右侧：打卡记录列表 */
        .right-panel {
            flex: 1.8;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            border-radius: 42px;
            padding: 20px 18px;
            border: 1px solid rgba(255,255,255,0.9);
            display: flex;
            flex-direction: column;
        }

        .records-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding: 0 12px;
        }

        .records-header h3 {
            font-size: 20px;
            font-weight: 700;
            color: #163856;
            letter-spacing: -0.2px;
        }

        .records-header h3 i {
            margin-right: 8px;
            font-size: 22px;
        }

        .badge-today {
            background: #1e3c5c;
            color: white;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #ffd966;
        }

        /* 记录列表滚动区 */
        .records-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 6px;
        }

        /* 自定义滚动条 */
        .records-list::-webkit-scrollbar {
            width: 6px;
        }

        .records-list::-webkit-scrollbar-track {
            background: #d9e2ec;
            border-radius: 20px;
        }

        .records-list::-webkit-scrollbar-thumb {
            background: #4f6f9f;
            border-radius: 20px;
        }

        /* 单条记录 - 卡片风格 */
        .record-item {
            background: white;
            border-radius: 24px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 1px solid #e6edf5;
            box-shadow: 0 4px 10px -8px #1f3a5f;
            transition: all 0.2s;
            animation: recordAppear 0.3s ease;
        }

        @keyframes recordAppear {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .record-item:hover {
            transform: translateX(5px);
            border-color: #ffd966;
        }

        .record-avatar {
            width: 44px;
            height: 44px;
            border-radius: 20px;
            background: #ffd966;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 600;
            color: #1e3c5c;
            border: 2px solid white;
            box-shadow: 0 4px 0 #b38b40;
            flex-shrink: 0;
        }

        .record-info {
            flex: 1;
            min-width: 0;
        }

        .record-name-class {
            display: flex;
            align-items: baseline;
            gap: 8px;
            flex-wrap: wrap;
        }

        .record-name {
            font-weight: 700;
            font-size: 17px;
            color: #0f2e4a;
        }

        .record-class {
            font-size: 14px;
            color: #6b7f9c;
            background: #eef3f9;
            padding: 3px 10px;
            border-radius: 30px;
        }

        .record-time {
            font-size: 13px;
            color: #3e6188;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .record-time span {
            background: #e3ecf5;
            padding: 3px 10px;
            border-radius: 30px;
            font-size: 12px;
        }

        /* 底部按钮区域 */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding: 8px 12px 0 12px;
        }

        .test-btn {
            background: #ffd966;
            border: none;
            color: #1e3c5c;
            font-weight: 700;
            padding: 14px 32px;
            border-radius: 40px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 10px 0 #b38b40, 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.1s;
            border: 2px solid white;
            letter-spacing: 0.5px;
        }

        .test-btn:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #b38b40, 0 6px 12px rgba(0,0,0,0.1);
        }

        .nfc-status {
            background: #eef3f9;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 15px;
            font-weight: 500;
            color: #163856;
            border: 1px solid white;
        }

        /* 初始隐藏信息卡片 */
        .user-info-card {
            display: none;
        }
        .user-info-card.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="landscape-container">
        <!-- 头部学校信息 -->
        <div class="header">
            <div class="school-area">
                <div class="school-logo">🏫</div>
                <div class="school-name">
                    阳光中学 <span>· 校园一卡通</span>
                </div>
            </div>
            <div class="date-badge" id="currentDate"></div>
        </div>

        <!-- 主要内容左右分区 -->
        <div class="main-content">
            <!-- 左侧：空心圆 + 打卡信息 -->
            <div class="left-panel">
                <div class="circle-wrapper">
                    <div class="hollow-circle" id="hollowCircle"></div>
                </div>

                <!-- 打卡信息卡片 (初始隐藏，拍卡后显示+动画) -->
                <div class="user-info-card" id="userInfoCard">
                    <div class="student-row">
                        <div class="student-avatar" id="studentAvatar">👨‍🎓</div>
                        <div class="student-details">
                            <div class="student-name" id="studentName">李明</div>
                            <div class="student-class" id="studentClass">
                                <span>高二(3)班</span>
                            </div>
                        </div>
                    </div>
                    <div class="datetime-detail">
                        <span id="recordDate">2026-03-03</span>
                        <span id="recordTime">14:28:35</span>
                    </div>
                </div>
            </div>

            <!-- 右侧：打卡记录列表 -->
            <div class="right-panel">
                <div class="records-header">
                    <h3><i>📋</i> 今日打卡记录</h3>
                    <div class="badge-today" id="recordCount">12 人</div>
                </div>
                <div class="records-list" id="recordsList">
                    <!-- 记录会动态插入 -->
                </div>
            </div>
        </div>

        <!-- 底部测试按钮和状态 -->
        <div class="footer">
            <button class="test-btn" id="testButton">🔘 模拟拍卡</button>
            <div class="nfc-status" id="nfcStatus">📱 等待拍卡...</div>
        </div>
    </div>

    <script>
        (function() {
            // DOM 元素
            const circle = document.getElementById('hollowCircle');
            const userInfoCard = document.getElementById('userInfoCard');
            const studentAvatar = document.getElementById('studentAvatar');
            const studentName = document.getElementById('studentName');
            const studentClass = document.getElementById('studentClass');
            const recordDate = document.getElementById('recordDate');
            const recordTime = document.getElementById('recordTime');
            const recordsList = document.getElementById('recordsList');
            const recordCount = document.getElementById('recordCount');
            const nfcStatus = document.getElementById('nfcStatus');
            const testBtn = document.getElementById('testButton');
            const currentDateEl = document.getElementById('currentDate');

            // 设置当前日期
            const today = new Date();
            const dateStr = today.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric' });
            currentDateEl.innerText = dateStr;

            // ========== 学生数据 ==========
            const students = [
                { name: '李明', class: '高二(3)班', avatar: '📚', cardId: '04:23:AC:FE:12:34:80' },
                { name: '王小雨', class: '高二(1)班', avatar: '🎨', cardId: 'F2:1A:9B:44:56:78:90' },
                { name: '张子轩', class: '高三(5)班', avatar: '⚽', cardId: '8C:7B:35:11:AB:CD:EF' },
                { name: '陈欣然', class: '高一(2)班', avatar: '🎵', cardId: 'A1:B2:C3:D4:E5:F6:07' },
                { name: '林小美', class: '高二(7)班', avatar: '🌸', cardId: 'test-001' },
                { name: '黄子豪', class: '高三(1)班', avatar: '🏀', cardId: 'test-002' },
                { name: '周若琪', class: '高一(4)班', avatar: '⭐', cardId: 'test-003' },
                { name: '吴子涵', class: '高二(3)班', avatar: '🎮', cardId: 'test-004' }
            ];

            // 用卡片ID快速查找
            const studentMap = {};
            students.forEach(s => { studentMap[s.cardId] = s; });

            // 随机找一个学生 (用于模拟)
            function getRandomStudent() {
                return students[Math.floor(Math.random() * students.length)];
            }

            // ========== 打卡记录数组 ==========
            let attendanceRecords = [];

            // 添加初始几条记录
            function initRecords() {
                const now = new Date();
                const baseTime = new Date(now.setHours(8, 0, 0));
                attendanceRecords = [
                    { student: students[0], time: new Date(baseTime.getTime() + 5*60000) },
                    { student: students[2], time: new Date(baseTime.getTime() + 12*60000) },
                    { student: students[4], time: new Date(baseTime.getTime() + 18*60000) },
                    { student: students[6], time: new Date(baseTime.getTime() + 25*60000) }
                ];
                renderRecords();
            }
            initRecords();

            // 渲染记录列表
            function renderRecords() {
                // 按时间倒序排列
                const sorted = [...attendanceRecords].sort((a, b) => b.time - a.time);
                
                let html = '';
                sorted.forEach(record => {
                    const stu = record.student;
                    const time = record.time;
                    const timeStr = time.toLocaleTimeString('zh-CN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
                    const dateStr = time.toLocaleDateString('zh-CN').slice(5); // MM-DD
                    
                    html += `
                        <div class="record-item">
                            <div class="record-avatar">${stu.avatar}</div>
                            <div class="record-info">
                                <div class="record-name-class">
                                    <span class="record-name">${stu.name}</span>
                                    <span class="record-class">${stu.class}</span>
                                </div>
                                <div class="record-time">
                                    <span>${dateStr}</span> ${timeStr}
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                recordsList.innerHTML = html || '<div style="padding: 20px; text-align: center; color: #7f8fa6;">暂无打卡记录</div>';
                recordCount.innerText = attendanceRecords.length + ' 人';
            }

            // ========== 拍卡成功动画 + 信息展示 ==========
            function handleScanSuccess(student) {
                // 1. 移除旧动画类，重新触发
                circle.classList.remove('scan-success', 'scanning');
                void circle.offsetWidth; // 强制重绘
                circle.classList.add('scan-success');

                // 2. 更新信息卡片内容
                studentAvatar.innerText = student.avatar;
                studentName.innerText = student.name;
                studentClass.innerHTML = `<span>${student.class}</span>`;
                
                const now = new Date();
                const datePart = now.toLocaleDateString('zh-CN');
                const timePart = now.toLocaleTimeString('zh-CN', { hour12: false });
                recordDate.innerText = datePart;
                recordTime.innerText = timePart;

                // 3. 显示卡片 (加上动画class)
                userInfoCard.classList.add('show');
                
                // 4. 添加到记录列表
                attendanceRecords.push({
                    student: student,
                    time: new Date()
                });
                renderRecords();

                // 5. 更新状态
                nfcStatus.innerText = `✅ 刚刚打卡: ${student.name}`;
                
                // 6. 0.8秒后移除放大特效，但保留空心圆
                setTimeout(() => {
                    circle.classList.remove('scan-success');
                }, 800);
            }

            // ========== 模拟扫描中动画 ==========
            function startScanAnimation() {
                circle.classList.remove('scan-success');
                circle.classList.add('scanning');
                nfcStatus.innerText = '⏳ 感应拍卡...';
            }

            // ========== 测试按钮点击 ==========
            testBtn.addEventListener('click', function() {
                startScanAnimation();
                
                // 随机延迟0.6s后成功
                setTimeout(() => {
                    const randomStudent = getRandomStudent();
                    handleScanSuccess(randomStudent);
                }, 600);
            });

            // ========== 真实NFC (Web NFC) ==========
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    ndef.scan().then(() => {
                        nfcStatus.innerText = '📱 请拍卡';
                    }).catch(err => {
                        nfcStatus.innerText = '⚠️ NFC未授权';
                    });

                    ndef.addEventListener('reading', (event) => {
                        const cardId = event.serialNumber;
                        nfcStatus.innerText = `📇 卡片: ${cardId.substring(0,8)}...`;
                        
                        // 查找对应学生
                        let student = studentMap[cardId];
                        if (!student) {
                            // 如果是不认识的卡，随机分配一个
                            student = getRandomStudent();
                            nfcStatus.innerText = `🆕 新卡 → ${student.name}`;
                        }
                        
                        handleScanSuccess(student);
                    });

                    ndef.addEventListener('readingerror', () => {
                        nfcStatus.innerText = '❌ 读取失败，重试';
                    });
                } catch (e) {
                    nfcStatus.innerText = '📱 NFC不可用 (模拟模式)';
                }
            } else {
                nfcStatus.innerText = '📱 请用测试按钮 (无NFC)';
            }

            // 预加载一个学生卡片占位？不用，保持隐藏就好
        })();
    </script>
</body>
</html>
