<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC打卡 · 橙蓝白主题 + Excel导出</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f5f7fa;
            background-image: radial-gradient(circle at 10% 20%, rgba(255, 140, 0, 0.03) 0%, transparent 30%),
                              radial-gradient(circle at 90% 80%, rgba(25, 55, 110, 0.03) 0%, transparent 40%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .dashboard {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            display: flex;
            gap: 24px;
        }

        /* ===== 左侧 - NFC打卡区域 ===== */
        .left-panel {
            flex: 1;
            background: white;
            border-radius: 60px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 右侧面板 */
        .right-panel {
            width: 480px;
            background: white;
            border-radius: 60px;
            padding: 28px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid #eef2f6;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .title-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .title-section h1 {
            color: #0a1a3a;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: -0.5px;
        }

        .title-section .sub {
            color: #ff8c00;
            background: rgba(255, 140, 0, 0.08);
            padding: 6px 20px;
            border-radius: 40px;
            display: inline-block;
            border: 1px solid rgba(255, 140, 0, 0.2);
            font-weight: 500;
        }

        /* NFC卡片容器 */
        .nfc-card-container {
            position: relative;
            width: 360px;
            height: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 20px 0;
        }

        /* 主圆圈 - 深蓝色 */
        .circle-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 10;
        }

        .hollow-circle {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 4px solid #0a1a3a;
            background: transparent;
            box-shadow: 0 0 0 2px rgba(10, 26, 58, 0.05), 0 20px 40px -10px rgba(0, 0, 0, 0.15);
            position: relative;
            transition: all 0.3s ease;
        }

        .circle-pulse {
            animation: circleScale 2s ease-in-out infinite;
        }

        @keyframes circleScale {
            0%, 100% { 
                transform: scale(1); 
                border-color: #0a1a3a;
            }
            50% { 
                transform: scale(1.1); 
                border-color: #ff8c00;
                box-shadow: 0 0 20px rgba(255, 140, 0, 0.4);
            }
        }

        .hollow-circle::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 140, 0, 0.4);
        }

        /* 对勾容器 */
        .check-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 15;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .check-container.show {
            opacity: 1;
        }

        .checkmark-svg {
            width: 100px;
            height: 100px;
            filter: drop-shadow(0 4px 8px rgba(255, 140, 0, 0.3));
        }

        .checkmark-circle {
            stroke: #ff8c00;
            stroke-width: 4;
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            fill: none;
            animation: drawCircle 0.5s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .checkmark-path {
            stroke: #ff8c00;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            fill: none;
            animation: drawCheck 0.4s cubic-bezier(0.65, 0, 0.45, 1) 0.3s forwards;
        }

        @keyframes drawCircle {
            100% { stroke-dashoffset: 0; }
        }

        @keyframes drawCheck {
            100% { stroke-dashoffset: 0; }
        }

        /* 状态文字 */
        .status-text {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #0a1a3a;
            font-size: 1.1rem;
            background: white;
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid #eef2f6;
            white-space: nowrap;
            z-index: 5;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .status-text.hidden {
            opacity: 0;
            pointer-events: none;
        }

        /* 发光圆圈 - 包裹个人资讯 */
        .glow-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 340px;
            height: 340px;
            border-radius: 50%;
            background: transparent;
            border: 4px solid #ff8c00;
            box-shadow: 0 0 40px rgba(255, 140, 0, 0.3);
            z-index: 19;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            animation: glowRotate 3s linear infinite;
        }

        .glow-circle.show {
            opacity: 1;
        }

        .glow-circle::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border-radius: 50%;
            border: 2px dashed rgba(255, 140, 0, 0.4);
        }

        @keyframes glowRotate {
            0% { transform: translate(-50%, -50%) rotate(0deg); }
            100% { transform: translate(-50%, -50%) rotate(360deg); }
        }

        /* 个人资讯卡片 */
        .info-card {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 320px;
            background: white;
            border-radius: 40px;
            padding: 28px;
            box-shadow: 0 30px 50px -20px rgba(10, 26, 58, 0.3);
            border: 1px solid #eef2f6;
            z-index: 20;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0;
            pointer-events: none;
        }

        .info-card.show {
            opacity: 1;
            pointer-events: auto;
        }

        .info-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
        }

        .info-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(145deg, #0a1a3a, #1a2a4a);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
        }

        .info-title h2 {
            color: #0a1a3a;
            font-size: 2rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .info-title p {
            color: #64748b;
            font-size: 1rem;
            margin-top: 4px;
        }

        .info-details {
            background: #f8fafc;
            border-radius: 28px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .detail-item {
            text-align: center;
        }

        .detail-label {
            color: #64748b;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .detail-value {
            color: #0a1a3a;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .badge-orange {
            background: #ff8c00;
            color: white;
            padding: 6px 16px;
            border-radius: 40px;
            font-weight: 500;
        }

        /* 测试按钮 */
        .test-btn {
            position: absolute;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            border: 1px solid #0a1a3a;
            color: #0a1a3a;
            padding: 10px 28px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 30;
            font-weight: 500;
        }

        .test-btn:hover {
            background: #0a1a3a;
            color: white;
        }

        /* ===== 右侧历史记录样式 ===== */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px 20px 12px;
            border-bottom: 1px solid #eef2f6;
        }

        .history-header h2 {
            color: #0a1a3a;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header-actions {
            display: flex;
            gap: 10px;
        }

        .excel-btn {
            background: #ff8c00;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            font-weight: 500;
        }

        .excel-btn:hover {
            background: #e67e00;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(255, 140, 0, 0.2);
        }

        .count {
            background: #f1f5f9;
            color: #0a1a3a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            min-height: 400px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .history-item {
            background: #f8fafc;
            border-radius: 24px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            border: 1px solid #eef2f6;
            animation: slideIn 0.3s ease;
            transition: all 0.2s;
        }

        .history-item:hover {
            border-color: #ff8c00;
            box-shadow: 0 8px 15px rgba(255, 140, 0, 0.1);
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-avatar {
            width: 52px;
            height: 52px;
            background: #0a1a3a;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            color: #0a1a3a;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .history-meta {
            display: flex;
            gap: 12px;
            color: #64748b;
            font-size: 0.85rem;
        }

        .history-meta span {
            background: white;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .history-date {
            color: #ff8c00;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stats-footer {
            margin-top: 20px;
            padding: 16px 12px 8px;
            border-top: 1px solid #eef2f6;
            display: flex;
            justify-content: space-between;
            color: #0a1a3a;
            font-weight: 500;
        }

        .stats-footer .today-count {
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 30px;
            color: #ff8c00;
        }

        /* 飞入目标 */
        .fly-target {
            position: absolute;
            top: 80px;
            right: 30px;
            width: 40px;
            height: 40px;
            border-radius: 20px;
            background: rgba(255, 140, 0, 0.1);
            border: 2px dashed #ff8c00;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            color: #ff8c00;
        }

        .fly-target.show {
            opacity: 1;
            animation: targetPulse 0.5s infinite;
        }

        @keyframes targetPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* 飞入路径 */
        .flight-path {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }

        .flight-line {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 2px;
            height: 2px;
            background: #ff8c00;
            box-shadow: 0 0 10px #ff8c00;
            border-radius: 50%;
            animation: flyLine 0.8s ease-out forwards;
        }

        @keyframes flyLine {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            100% {
                transform: translate(calc(50vw - 200px), -150px) scale(0);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- 飞入路径容器 -->
    <div class="flight-path" id="flightPath"></div>

    <div class="dashboard">
        <!-- 左侧：NFC打卡区域 -->
        <div class="left-panel">
            <div class="title-section">
                <h1>NFC 考勤系统</h1>
                <div class="sub">⚡ 靠近卡片自动打卡</div>
            </div>

            <!-- NFC卡片容器 -->
            <div class="nfc-card-container">
                <!-- 圆圈 - 深蓝色 -->
                <div class="circle-wrapper" id="circleWrapper">
                    <div class="hollow-circle circle-pulse" id="hollowCircle"></div>
                </div>

                <!-- 对勾容器 - 橙色 -->
                <div class="check-container" id="checkContainer">
                    <svg class="checkmark-svg" viewBox="0 0 52 52">
                        <circle class="checkmark-circle" cx="26" cy="26" r="25" fill="none"/>
                        <path class="checkmark-path" fill="none" d="M14 27l7 7 16-16"/>
                    </svg>
                </div>

                <!-- 发光圆圈 - 橙色包裹 -->
                <div class="glow-circle" id="glowCircle"></div>

                <!-- 个人资讯卡片 -->
                <div class="info-card" id="infoCard">
                    <div class="info-header">
                        <div class="info-avatar" id="infoAvatar">👨‍💻</div>
                        <div class="info-title">
                            <h2 id="infoName">张明远</h2>
                            <p id="infoDept">研发中心 · 架构组</p>
                        </div>
                    </div>
                    <div class="info-details">
                        <div class="detail-item">
                            <div class="detail-label">工号</div>
                            <div class="detail-value" id="infoId">HW-2304</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-label">打卡时间</div>
                            <div class="detail-value" id="infoTime">08:32</div>
                        </div>
                        <span class="badge-orange" id="infoStatus">已打卡</span>
                    </div>
                </div>

                <!-- 状态文字 -->
                <div class="status-text" id="statusText">⚪ 等待NFC卡片...</div>

                <!-- 测试按钮 -->
                <button class="test-btn" id="testBtn">🔄 模拟打卡</button>
            </div>
        </div>

        <!-- 右侧：历史记录 + Excel导出 -->
        <div class="right-panel">
            <!-- 飞入目标 -->
            <div class="fly-target" id="flyTarget">📥</div>

            <div class="history-header">
                <h2>📋 本月打卡记录</h2>
                <div class="header-actions">
                    <div class="count" id="todayCount">0 人</div>
                    <button class="excel-btn" id="excelBtn">
                        <span>📊</span> 导出Excel
                    </button>
                </div>
            </div>

            <div class="history-list" id="historyList">
                <!-- 动态插入历史记录 -->
            </div>

            <div class="stats-footer">
                <span>📅 本月累计</span>
                <span class="today-count" id="totalCountSpan">0 次</span>
            </div>
        </div>
    </div>

    <!-- 引入SheetJS (xlsx) 用于导出Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>

    <script>
        (function() {
            // DOM元素
            const circleWrapper = document.getElementById('circleWrapper');
            const hollowCircle = document.getElementById('hollowCircle');
            const checkContainer = document.getElementById('checkContainer');
            const glowCircle = document.getElementById('glowCircle');
            const statusText = document.getElementById('statusText');
            const infoCard = document.getElementById('infoCard');
            const flyTarget = document.getElementById('flyTarget');
            const flightPath = document.getElementById('flightPath');
            const testBtn = document.getElementById('testBtn');
            const excelBtn = document.getElementById('excelBtn');
            const historyList = document.getElementById('historyList');
            const todayCount = document.getElementById('todayCount');
            const totalCountSpan = document.getElementById('totalCountSpan');
            
            // 资讯元素
            const infoAvatar = document.getElementById('infoAvatar');
            const infoName = document.getElementById('infoName');
            const infoDept = document.getElementById('infoDept');
            const infoId = document.getElementById('infoId');
            const infoTime = document.getElementById('infoTime');

            // 状态
            let nfcReader = null;
            let isScanning = false;
            let timeoutId = null;
            let checkTimeoutId = null;
            let historyRecords = [];

            // 员工数据库
            const staffDatabase = [
                {
                    name: '张明远',
                    dept: '研发中心 · 架构组',
                    id: 'HW-2304',
                    avatar: '👨‍💻'
                },
                {
                    name: '李思睿',
                    dept: '产品部 · 设计组',
                    id: 'HW-1789',
                    avatar: '👩‍🎨'
                },
                {
                    name: '王华强',
                    dept: '测试部 · 自动化',
                    id: 'HW-5521',
                    avatar: '👨‍🔧'
                },
                {
                    name: '赵一鸣',
                    dept: '销售部 · 华东区',
                    id: 'HW-3321',
                    avatar: '👨‍💼'
                },
                {
                    name: '孙小美',
                    dept: '人事部 · 招聘组',
                    id: 'HW-7788',
                    avatar: '👩‍💼'
                },
                {
                    name: '周检测',
                    dept: '质量部 · 检测组',
                    id: 'TEST-006',
                    avatar: '🔍'
                },
                {
                    name: '吴验证',
                    dept: '验证部 · 流程组',
                    id: 'TEST-007',
                    avatar: '📋'
                },
                {
                    name: '郑确认',
                    dept: '确认部 · 验收组',
                    id: 'TEST-008',
                    avatar: '✅'
                }
            ];

            // 获取当前完整日期时间
            function getCurrentDateTime() {
                const now = new Date();
                const year = now.getFullYear();
                const month = (now.getMonth() + 1).toString().padStart(2, '0');
                const day = now.getDate().toString().padStart(2, '0');
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                const seconds = now.getSeconds().toString().padStart(2, '0');
                return {
                    date: `${year}-${month}-${day}`,
                    time: `${hours}:${minutes}:${seconds}`,
                    display: `${month}-${day} ${hours}:${minutes}`
                };
            }

            // 显示飞入路径
            function showFlightPath() {
                const line = document.createElement('div');
                line.className = 'flight-line';
                flightPath.appendChild(line);
                
                setTimeout(() => {
                    line.remove();
                }, 800);
            }

            // 重置对勾动画
            function resetCheckAnimation() {
                const svg = checkContainer.querySelector('svg');
                const newSvg = svg.cloneNode(true);
                checkContainer.replaceChild(newSvg, svg);
            }

            // 添加新记录到历史列表
            function addHistoryRecord(employee) {
                const dt = getCurrentDateTime();
                
                // 创建新记录对象
                const newRecord = {
                    id: Date.now(),
                    name: employee.name,
                    dept: employee.dept.split('·')[0].trim(),
                    fullDept: employee.dept,
                    empId: employee.id,
                    avatar: employee.avatar,
                    date: dt.date,
                    time: dt.time,
                    displayTime: dt.display
                };
                
                // 添加到数组开头
                historyRecords.unshift(newRecord);
                
                // 重新渲染列表
                renderHistoryList();
                
                // 更新计数
                updateCounts();
            }

            // 渲染历史列表
            function renderHistoryList() {
                if (historyRecords.length === 0) {
                    historyList.innerHTML = '<div class="history-item" style="opacity: 0.6;"><div class="history-avatar">⏳</div><div class="history-info"><div class="history-name">等待打卡...</div><div class="history-meta"><span>--</span></div></div><div class="history-date">--:--</div></div>';
                    return;
                }

                let html = '';
                historyRecords.forEach(record => {
                    html += `
                        <div class="history-item">
                            <div class="history-avatar">${record.avatar}</div>
                            <div class="history-info">
                                <div class="history-name">${record.name}</div>
                                <div class="history-meta">
                                    <span>${record.dept}</span>
                                    <span>${record.empId}</span>
                                </div>
                            </div>
                            <div class="history-date">${record.displayTime}</div>
                        </div>
                    `;
                });
                historyList.innerHTML = html;
            }

            // 更新计数
            function updateCounts() {
                const count = historyRecords.length;
                todayCount.textContent = `${count} 人`;
                totalCountSpan.textContent = `${count} 次`;
            }

            // 导出Excel - 包含一个月的数据模拟
            function exportToExcel() {
                // 准备Excel数据
                let excelData = [];
                
                // 添加表头
                excelData.push(['日期', '时间', '姓名', '部门', '工号', '打卡状态']);
                
                if (historyRecords.length === 0) {
                    // 如果没有记录，显示提示
                    excelData.push(['暂无打卡记录', '', '', '', '', '']);
                } else {
                    // 添加所有记录
                    historyRecords.forEach(record => {
                        excelData.push([
                            record.date,
                            record.time,
                            record.name,
                            record.fullDept || record.dept,
                            record.empId,
                            '已打卡'
                        ]);
                    });
                    
                    // 模拟过去30天的数据（用于演示）
                    // 实际应用中，这里应该是真实的一个月历史数据
                    const today = new Date();
                    for (let i = 1; i <= 30; i++) {
                        const date = new Date(today);
                        date.setDate(date.getDate() - i);
                        const year = date.getFullYear();
                        const month = (date.getMonth() + 1).toString().padStart(2, '0');
                        const day = date.getDate().toString().padStart(2, '0');
                        const dateStr = `${year}-${month}-${day}`;
                        
                        // 随机选择员工（模拟历史数据）
                        if (i % 3 === 0) { // 每3天有一条记录
                            const emp = staffDatabase[i % staffDatabase.length];
                            excelData.push([
                                dateStr,
                                '09:00:00',
                                emp.name,
                                emp.dept,
                                emp.id,
                                '已打卡'
                            ]);
                        }
                    }
                }
                
                // 创建工作簿
                const wb = XLSX.utils.book_new();
                const ws = XLSX.utils.aoa_to_sheet(excelData);
                
                // 设置列宽
                ws['!cols'] = [
                    { wch: 12 }, // 日期
                    { wch: 10 }, // 时间
                    { wch: 12 }, // 姓名
                    { wch: 20 }, // 部门
                    { wch: 12 }, // 工号
                    { wch: 10 }  // 状态
                ];
                
                XLSX.utils.book_append_sheet(wb, ws, '打卡记录');
                
                // 导出文件
                const fileName = `打卡记录_${new Date().toISOString().slice(0,10)}.xlsx`;
                XLSX.writeFile(wb, fileName);
                
                // 提示用户
                alert(`Excel导出成功！\n文件名称：${fileName}\n包含${excelData.length-1}条记录`);
            }

            // 打卡成功动画
            function showPunchSuccess() {
                // 随机选择一个员工
                const employee = staffDatabase[Math.floor(Math.random() * staffDatabase.length)];

                // 清除之前的定时器
                if (timeoutId) clearTimeout(timeoutId);
                if (checkTimeoutId) clearTimeout(checkTimeoutId);

                // 1. 圆圈停止跳动
                hollowCircle.classList.remove('circle-pulse');
                
                // 2. 隐藏状态文字
                statusText.classList.add('hidden');
                
                // 3. 更新个人资讯
                infoAvatar.textContent = employee.avatar;
                infoName.textContent = employee.name;
                infoDept.textContent = employee.dept;
                infoId.textContent = employee.id;
                infoTime.textContent = getCurrentDateTime().display.slice(-5);
                
                // 4. 显示个人资讯卡片和发光圆圈
                infoCard.classList.add('show');
                glowCircle.classList.add('show');
                
                // 5. 显示飞入目标
                flyTarget.classList.add('show');
                
                // 6. 1.5秒后卡片飞向目标
                timeoutId = setTimeout(() => {
                    // 显示飞入路径
                    showFlightPath();
                    
                    // 添加记录到历史列表
                    addHistoryRecord(employee);
                    
                    // 隐藏卡片和发光圆圈
                    infoCard.classList.remove('show');
                    glowCircle.classList.remove('show');
                    flyTarget.classList.remove('show');
                    
                    // 重置对勾动画
                    resetCheckAnimation();
                    
                    // 显示对勾
                    checkContainer.classList.add('show');
                    
                    // 1.5秒后恢复待机
                    checkTimeoutId = setTimeout(() => {
                        // 隐藏对勾
                        checkContainer.classList.remove('show');
                        
                        // 恢复圆圈跳动
                        hollowCircle.classList.add('circle-pulse');
                        
                        // 显示状态文字
                        statusText.classList.remove('hidden');
                        statusText.innerHTML = '⚪ 等待NFC卡片...';
                        
                        timeoutId = null;
                        checkTimeoutId = null;
                    }, 1500);
                    
                }, 1500);
            }

            // 初始化NFC
            async function initNfc() {
                if (!('NDEFReader' in window)) {
                    statusText.innerHTML = '❌ 浏览器不支持NFC';
                    return;
                }

                try {
                    nfcReader = new NDEFReader();
                    
                    nfcReader.addEventListener('reading', event => {
                        showPunchSuccess();
                    });

                    await nfcReader.scan();
                    isScanning = true;
                    statusText.innerHTML = '🟢 持续待机中...';
                    
                } catch (error) {
                    statusText.innerHTML = '❌ NFC启动失败';
                }
            }

            // 测试打卡
            function handleTestPunch() {
                showPunchSuccess();
            }

            // 事件监听
            testBtn.addEventListener('click', handleTestPunch);
            excelBtn.addEventListener('click', exportToExcel);

            // 初始化
            window.addEventListener('load', () => {
                initNfc();
                
                // 添加一些示例记录
                setTimeout(() => {
                    if (historyRecords.length === 0) {
                        // 添加今天的记录
                        addHistoryRecord(staffDatabase[0]);
                        setTimeout(() => addHistoryRecord(staffDatabase[1]), 300);
                        setTimeout(() => addHistoryRecord(staffDatabase[2]), 600);
                        
                        // 添加一些历史记录（模拟一个月）
                        setTimeout(() => {
                            // 修改记录的日期为前几天
                            const records = historyRecords;
                            const today = new Date();
                            
                            // 修改第二条记录的日期为昨天
                            if (records.length > 1) {
                                const yesterday = new Date(today);
                                yesterday.setDate(yesterday.getDate() - 1);
                                const yMonth = (yesterday.getMonth() + 1).toString().padStart(2,'0');
                                const yDay = yesterday.getDate().toString().padStart(2,'0');
                                records[1].date = `${today.getFullYear()}-${yMonth}-${yDay}`;
                                records[1].displayTime = `${yMonth}-${yDay} ${records[1].time.slice(0,5)}`;
                            }
                            
                            // 修改第三条记录的日期为前天
                            if (records.length > 2) {
                                const twoDaysAgo = new Date(today);
                                twoDaysAgo.setDate(twoDaysAgo.getDate() - 2);
                                const tMonth = (twoDaysAgo.getMonth() + 1).toString().padStart(2,'0');
                                const tDay = twoDaysAgo.getDate().toString().padStart(2,'0');
                                records[2].date = `${today.getFullYear()}-${tMonth}-${tDay}`;
                                records[2].displayTime = `${tMonth}-${tDay} ${records[2].time.slice(0,5)}`;
                            }
                            
                            renderHistoryList();
                        }, 1000);
                    }
                }, 1000);
            });

            // 清理
            window.addEventListener('beforeunload', async () => {
                if (isScanning && nfcReader) {
                    try { await nfcReader.stop(); } catch (e) {}
                }
                if (timeoutId) clearTimeout(timeoutId);
                if (checkTimeoutId) clearTimeout(checkTimeoutId);
            });
        })();
    </script>
</body>
</html>
