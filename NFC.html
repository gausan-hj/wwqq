<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>华为风格 · NFC打卡（真实+测试）</title>
    <style>
        /* 样式保持不变 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'HarmonyOS Sans', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #eaeef5 0%, #d0dbe9 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }

        .card {
            max-width: 480px;
            width: 100%;
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 56px;
            padding: 30px 24px 40px 24px;
            box-shadow: 0 30px 50px -20px rgba(24, 40, 60, 0.4),
                        0 0 0 1px rgba(255,255,255,0.6) inset;
            border: 1px solid rgba(255,255,255,0.5);
        }

        h1 {
            text-align: center;
            font-weight: 400;
            font-size: 2.0rem;
            letter-spacing: 1px;
            color: #1e2e4a;
            margin-bottom: 6px;
            text-shadow: 0 2px 4px rgba(255,255,255,0.6);
        }

        .sub {
            text-align: center;
            color: #2f4468;
            font-weight: 380;
            margin-bottom: 24px;
            font-size: 1.0rem;
            background: rgba(255,255,255,0.4);
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
            padding: 6px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .nfc-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 10px 0 24px 0;
        }

        .circle-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 24px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .circle-ambient {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(150,190,240,0.1) 80%);
            filter: blur(12px);
            opacity: 0.7;
            z-index: 0;
        }

        .hollow-circle {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: transparent;
            box-shadow: 
                0 20px 30px -10px rgba(0, 25, 50, 0.25),
                0 0 0 2px rgba(255, 255, 255, 0.7) inset;
            border: 3px solid rgba(50, 80, 130, 0.25);
            z-index: 1;
            transition: box-shadow 0.2s, border-color 0.2s;
            backdrop-filter: blur(4px);
        }

        .hollow-circle::after {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border-radius: 50%;
            background: transparent;
            box-shadow: 0 0 0 1.5px rgba(90, 130, 200, 0.2) inset;
            pointer-events: none;
        }

        .ripple-layer {
            position: absolute;
            top: -6px;
            left: -6px;
            width: calc(100% + 12px);
            height: calc(100% + 12px);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
            opacity: 0;
        }

        .ripple-layer.active {
            opacity: 1;
        }

        .pulse-ring {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2.5px solid rgba(70, 130, 220, 0.5);
            box-shadow: 0 0 16px rgba(50, 120, 240, 0.6);
            animation: pulse 1.8s ease-out infinite;
        }

        .pulse-ring:nth-child(2) {
            animation-delay: 0.6s;
            border-color: rgba(90, 155, 255, 0.6);
            border-width: 2px;
        }

        .pulse-ring:nth-child(3) {
            animation-delay: 1.2s;
            border-color: rgba(120, 180, 255, 0.5);
            border-width: 2px;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.95);
                opacity: 1;
            }
            70% {
                transform: scale(1.5);
                opacity: 0;
            }
            100% {
                transform: scale(1.8);
                opacity: 0;
            }
        }

        .center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            background: transparent;
            transition: all 0.3s cubic-bezier(0.2, 1.2, 0.5, 1);
        }

        .check-svg {
            width: 56px;
            height: 56px;
            stroke: #1b5e3a;
            stroke-width: 4.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            filter: drop-shadow(0 4px 6px rgba(30, 120, 50, 0.2));
        }

        .nfc-svg {
            width: 50px;
            height: 50px;
            stroke: #2f4a70;
            stroke-width: 2.2;
            fill: none;
            opacity: 0.7;
        }

        .hidden {
            display: none !important;
        }

        .button-group {
            display: flex;
            gap: 12px;
            margin: 0 auto 12px auto;
            width: 100%;
            justify-content: center;
        }

        .action-btn {
            background: #1f3a60;
            border: none;
            color: white;
            font-size: 1.2rem;
            font-weight: 450;
            padding: 14px 20px;
            border-radius: 50px;
            box-shadow: 0 12px 18px -8px #0f2842, 0 3px 0 0 #0c1d30 inset, 0 -2px 6px rgba(255,255,255,0.3) inset;
            cursor: pointer;
            transition: all 0.12s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 1px solid rgba(255,255,255,0.3);
            letter-spacing: 0.7px;
            flex: 1;
            justify-content: center;
            min-width: 120px;
        }

        .action-btn.test-btn {
            background: #3a5e7a;
        }

        .action-btn:active {
            transform: translateY(3px);
            box-shadow: 0 8px 12px -6px #0f2842, 0 1px 0 0 #0c1d30 inset;
        }

        .action-btn:disabled {
            opacity: 0.5;
            transform: translateY(2px);
            box-shadow: 0 8px 10px -6px #0f2842;
            pointer-events: none;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 40px;
            padding: 24px 22px;
            border: 1px solid rgba(255,255,255,0.7);
            box-shadow: 0 12px 20px -12px rgba(22, 42, 70, 0.3);
            margin-top: 20px;
            transition: all 0.2s;
            color: #17324b;
        }

        .info-placeholder {
            text-align: center;
            color: #59748f;
            font-size: 1rem;
            padding: 10px 0;
            font-style: normal;
            letter-spacing: 0.3px;
        }

        .identity-row {
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 16px;
        }

        .avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(140deg, #b8d0f0, #6080b0);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2.0rem;
            font-weight: 400;
            box-shadow: 0 10px 14px -6px #304f72;
            border: 2.5px solid white;
        }

        .details {
            flex: 1;
        }

        .name {
            font-size: 1.8rem;
            font-weight: 520;
            line-height: 1.2;
            color: #0b2b48;
        }

        .badge {
            font-size: 0.95rem;
            background: #1e3f68;
            color: white;
            padding: 4px 14px;
            border-radius: 40px;
            display: inline-block;
            margin-top: 6px;
            box-shadow: inset 0 1px 5px rgba(255,255,255,0.4);
        }

        .meta {
            display: flex;
            justify-content: space-between;
            border-top: 1.5px dashed rgba(70, 100, 140, 0.3);
            padding-top: 16px;
            margin-top: 4px;
            color: #1e3d60;
            font-weight: 480;
        }

        .meta span {
            background: rgba(255,255,255,0.6);
            padding: 5px 16px;
            border-radius: 40px;
            font-size: 0.95rem;
            backdrop-filter: blur(2px);
        }

        .footer-hint {
            text-align: center;
            color: #41638b;
            margin-top: 20px;
            font-size: 0.88rem;
            background: rgba(255,255,255,0.3);
            padding: 6px 16px;
            border-radius: 60px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .nfc-status {
            font-size: 0.9rem;
            margin-top: 12px;
            color: #2f4468;
            background: rgba(255,255,255,0.5);
            padding: 8px 16px;
            border-radius: 30px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>HUAWEI NFC</h1>
        <div class="sub">真实打卡 + 测试模式</div>

        <!-- 空心圆动画区域 -->
        <div class="nfc-zone">
            <div class="circle-container" id="circleContainer">
                <div class="circle-ambient"></div>
                <div class="hollow-circle" id="hollowCircle"></div>
                
                <!-- 跳动波纹层 -->
                <div class="ripple-layer" id="rippleLayer">
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring"></div>
                    <div class="pulse-ring"></div>
                </div>

                <!-- 中央图标 -->
                <div class="center-icon" id="centerIcon">
                    <svg id="nfcSvg" class="nfc-svg" viewBox="0 0 40 40">
                        <path d="M12 20 Q 20 10, 28 20" stroke="currentColor" fill="none" stroke-width="2"/>
                        <path d="M8 25 Q 20 8, 32 25" stroke="currentColor" fill="none" stroke-width="2" opacity="0.8"/>
                        <circle cx="20" cy="29" r="2.5" fill="currentColor" stroke="none" opacity="0.9"/>
                    </svg>
                    <svg id="checkSvg" class="check-svg hidden" viewBox="0 0 50 50">
                        <path d="M10 27 L22 39 L42 13" stroke="currentColor" fill="none"/>
                    </svg>
                </div>
            </div>

            <!-- 按钮组：真实NFC + 测试按钮 -->
            <div class="button-group">
                <button class="action-btn" id="nfcBtn">
                    <span>📲</span> 开始扫描
                </button>
                <button class="action-btn test-btn" id="testBtn">
                    <span>🔄</span> 测试打卡
                </button>
            </div>
            <div id="nfcStatus" class="nfc-status">⚪ 点击开始扫描 或 使用测试按钮</div>
        </div>

        <!-- 身份信息面板 -->
        <div class="info-panel" id="infoPanel">
            <div id="infoPlaceholder" class="info-placeholder">
                🌟 打卡后显示员工信息
            </div>
            <div id="identityCard" class="hidden">
                <div class="identity-row">
                    <div class="avatar" id="userAvatar">👤</div>
                    <div class="details">
                        <div class="name" id="userName">张明远</div>
                        <span class="badge" id="userDept">鸿蒙OS · 核心组</span>
                    </div>
                </div>
                <div class="meta">
                    <span id="userId">工号 HW-2304</span>
                    <span id="userTime">打卡 09:17 AM</span>
                </div>
            </div>
        </div>

        <div class="footer-hint">
            <span>⚪ 测试按钮可模拟打卡 | 真实NFC请靠近手机背部</span>
        </div>
    </div>

    <script>
        (function() {
            // DOM 元素
            const rippleLayer = document.getElementById('rippleLayer');
            const nfcSvg = document.getElementById('nfcSvg');
            const checkSvg = document.getElementById('checkSvg');
            const nfcBtn = document.getElementById('nfcBtn');
            const testBtn = document.getElementById('testBtn');
            const nfcStatus = document.getElementById('nfcStatus');
            const infoPlaceholder = document.getElementById('infoPlaceholder');
            const identityCard = document.getElementById('identityCard');

            // 身份信息元素
            const userNameSpan = document.getElementById('userName');
            const userDeptSpan = document.getElementById('userDept');
            const userIdSpan = document.getElementById('userId');
            const userTimeSpan = document.getElementById('userTime');
            const userAvatar = document.getElementById('userAvatar');

            // 状态
            let isScanning = false;
            let nfcReader = null;

            // 模拟员工数据库
            const staffDatabase = {
                // 真实NFC卡片ID（替换成您的）
                '04:12:34:56:78:9A:BC': {
                    name: '张明远',
                    dept: '鸿蒙OS · 核心组',
                    id: '工号 HW-2304',
                    avatar: '👨‍💻'
                },
                '04:23:45:67:89:AB:CD': {
                    name: '李思睿',
                    dept: '智能汽车 · 座舱部',
                    id: '工号 HW-1789',
                    avatar: '👩‍🔧'
                },
                '04:34:56:78:9A:BC:DE': {
                    name: '王华强',
                    dept: '消费者BG · 软件部',
                    id: '工号 HW-5521',
                    avatar: '👨‍🚀'
                },
                // 测试用户（供测试按钮使用）
                'test-user-1': {
                    name: '赵测试',
                    dept: '质量与测试部',
                    id: '工号 TEST-001',
                    avatar: '🧪'
                },
                'test-user-2': {
                    name: '钱试用',
                    dept: '用户体验部',
                    id: '工号 TEST-002',
                    avatar: '🎨'
                },
                // 默认员工
                'default': {
                    name: '访客用户',
                    dept: '外部协作 · 临时',
                    id: '工号 TEMP-001',
                    avatar: '👤'
                }
            };

            // 格式化当前时间
            function getCurrentTime() {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                return `${hours}:${minutes}`;
            }

            // 根据NFC标签ID查找员工信息
            function findEmployeeByNfcId(nfcId) {
                const cleanId = nfcId.trim();
                return staffDatabase[cleanId] || staffDatabase['default'];
            }

            // 显示打卡成功界面
            function showPunchSuccess(employee, source, id) {
                // 停止跳动波纹
                rippleLayer.classList.remove('active');
                
                // 切换到对勾图标
                nfcSvg.classList.add('hidden');
                checkSvg.classList.remove('hidden');
                
                // 更新员工信息
                userNameSpan.textContent = employee.name;
                userDeptSpan.textContent = employee.dept;
                userIdSpan.textContent = employee.id;
                userTimeSpan.textContent = `打卡 ${getCurrentTime()}`;
                userAvatar.textContent = employee.avatar || '👤';
                
                // 显示身份卡片，隐藏占位符
                identityCard.classList.remove('hidden');
                infoPlaceholder.classList.add('hidden');

                // 状态提示
                if (source === 'nfc') {
                    nfcStatus.textContent = `✅ NFC打卡成功 (ID: ${id.substring(0, 8)}...)`;
                } else {
                    nfcStatus.textContent = `✅ 测试打卡成功 (测试用户)`;
                }
            }

            // 重置到待机状态（但保留最后一次打卡信息）
            function resetToIdle() {
                rippleLayer.classList.remove('active');
                nfcSvg.classList.remove('hidden');
                checkSvg.classList.add('hidden');
                // 注意：不重置信息卡片，保留最后一次打卡结果
            }

            // 处理真实NFC读取
            async function startNfcScan() {
                if (!('NDEFReader' in window)) {
                    nfcStatus.textContent = '❌ 您的浏览器不支持Web NFC（仅Android Chrome支持）';
                    return;
                }

                try {
                    // 如果已经在扫描，先停止
                    if (isScanning && nfcReader) {
                        await nfcReader.stop();
                        nfcReader = null;
                        isScanning = false;
                        nfcBtn.innerHTML = '<span>📲</span> 开始扫描';
                        nfcStatus.textContent = '⚪ 扫描已停止';
                        resetToIdle();
                        return;
                    }

                    // 创建新的NDEFReader
                    nfcReader = new NDEFReader();
                    
                    // 监听读取事件
                    nfcReader.addEventListener('reading', event => {
                        // 有卡片靠近，显示跳动动画
                        rippleLayer.classList.add('active');
                        nfcStatus.textContent = '📱 检测到NFC卡片，读取中...';

                        // 解析NFC标签ID
                        let nfcId = '未知ID';
                        if (event.serialNumber) {
                            nfcId = event.serialNumber;
                        } else {
                            // 如果没有serialNumber，生成一个随机的测试ID
                            nfcId = '04:' + Math.random().toString(16).substring(2, 10).toUpperCase();
                        }

                        console.log('NFC标签ID:', nfcId);

                        // 模拟网络延迟（让动画显示更明显）
                        setTimeout(() => {
                            // 查找员工信息
                            const employee = findEmployeeByNfcId(nfcId);
                            // 显示成功
                            showPunchSuccess(employee, 'nfc', nfcId);
                        }, 800);
                    });

                    nfcReader.addEventListener('readingerror', error => {
                        console.error('NFC读取错误:', error);
                        nfcStatus.textContent = '❌ 读取失败，请重试';
                        rippleLayer.classList.remove('active');
                    });

                    // 开始扫描
                    await nfcReader.scan();
                    
                    isScanning = true;
                    nfcBtn.innerHTML = '<span>⏹️</span> 停止扫描';
                    nfcStatus.textContent = '🟢 扫描中，请将NFC卡片靠近手机背部';
                    
                } catch (error) {
                    console.error('NFC启动失败:', error);
                    nfcStatus.textContent = `❌ 启动失败: ${error.message}`;
                    isScanning = false;
                    nfcReader = null;
                    nfcBtn.innerHTML = '<span>📲</span> 开始扫描';
                }
            }

            // 处理测试打卡
            function handleTestPunch() {
                // 如果正在NFC扫描，先停止（避免冲突）
                if (isScanning && nfcReader) {
                    nfcReader.stop().catch(console.error);
                    nfcReader = null;
                    isScanning = false;
                    nfcBtn.innerHTML = '<span>📲</span> 开始扫描';
                }

                // 显示跳动动画
                rippleLayer.classList.add('active');
                nfcStatus.textContent = '🧪 测试模式：模拟打卡中...';

                // 随机选择测试用户
                const testUsers = ['test-user-1', 'test-user-2'];
                const randomUser = testUsers[Math.floor(Math.random() * testUsers.length)];
                const employee = staffDatabase[randomUser];

                // 模拟网络延迟
                setTimeout(() => {
                    showPunchSuccess(employee, 'test', randomUser);
                }, 800);
            }

            // 按钮点击事件
            nfcBtn.addEventListener('click', startNfcScan);
            testBtn.addEventListener('click', handleTestPunch);

            // 点击圆圈也可以触发测试（方便操作）
            document.getElementById('circleContainer').addEventListener('click', handleTestPunch);

            // 页面卸载时停止NFC扫描
            window.addEventListener('beforeunload', async () => {
                if (isScanning && nfcReader) {
                    try {
                        await nfcReader.stop();
                    } catch (e) {
                        // 忽略错误
                    }
                }
            });

            // 初始状态
            nfcStatus.textContent = '⚪ 点击开始扫描 或 使用测试按钮';
        })();
    </script>
</body>
</html>
