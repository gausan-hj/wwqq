<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC打卡 · 橙韵黑白</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f8f8fa;
            background-image: radial-gradient(circle at 20% 30%, rgba(255, 140, 0, 0.03) 0%, transparent 30%),
                              radial-gradient(circle at 80% 70%, rgba(255, 100, 0, 0.02) 0%, transparent 35%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* 主容器 - 左右布局 */
        .dashboard {
            max-width: 1400px;
            width: 100%;
            height: 90vh;
            display: flex;
            gap: 24px;
        }

        /* 左侧 - NFC打卡区域 */
        .left-panel {
            flex: 1;
            background: #ffffff;
            border-radius: 48px;
            padding: 36px 28px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* 右侧 - 历史记录面板 */
        .right-panel {
            width: 400px;
            background: #ffffff;
            border-radius: 48px;
            padding: 28px 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
        }

        /* 标题区域 */
        .title-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .title-section h1 {
            color: #1a1a1a;
            font-size: 2.2rem;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .title-section .sub {
            color: #666666;
            font-size: 0.95rem;
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 60px;
            display: inline-block;
            border: 1px solid #dddddd;
        }

        /* NFC 空心圆 - 持续跳动版 */
        .nfc-container {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 30px 0 40px 0;
        }

        /* 外发光 - 橙色 */
        .glow-ring {
            position: absolute;
            inset: -15px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255, 140, 0, 0.25), rgba(255, 100, 0, 0.08) 70%);
            filter: blur(20px);
            opacity: 0.6;
            animation: glowPulse 3s infinite;
        }

        @keyframes glowPulse {
            0%, 100% { opacity: 0.5; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }

        /* 空心圆主体 - 黑白为主 */
        .hollow-main {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ffffff;
            border: 4px solid #222222;
            box-shadow: 
                0 0 0 2px #cccccc inset,
                0 20px 40px -10px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        /* 内圈 - 橙色点缀 */
        .hollow-main::after {
            content: '';
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border-radius: 50%;
            border: 2px solid #ff8c00;
            background: rgba(255, 140, 0, 0.02);
            pointer-events: none;
        }

        /* 持续跳动波纹层 - 橙色 */
        .ripple-permanent {
            position: absolute;
            top: -10px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            border-radius: 50%;
            z-index: 2;
            pointer-events: none;
        }

        .pulse-ring-perm {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid rgba(255, 140, 0, 0.5);
            box-shadow: 0 0 25px rgba(255, 100, 0, 0.3);
            animation: pulse-perm 2.2s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        .pulse-ring-perm:nth-child(2) {
            animation-delay: 0.8s;
            border-color: rgba(255, 120, 0, 0.4);
            border-width: 2.5px;
        }

        .pulse-ring-perm:nth-child(3) {
            animation-delay: 1.6s;
            border-color: rgba(255, 100, 0, 0.3);
            border-width: 2px;
        }

        @keyframes pulse-perm {
            0% {
                transform: scale(0.95);
                opacity: 1;
            }
            70% {
                transform: scale(1.6);
                opacity: 0;
            }
            100% {
                transform: scale(2.0);
                opacity: 0;
            }
        }

        /* 中央图标 */
        .center-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100px;
            height: 100px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 5;
            background: #ffffff;
            border: 2px solid #222222;
            transition: all 0.3s ease;
        }

        .check-svg {
            width: 64px;
            height: 64px;
            stroke: #ff8c00;
            stroke-width: 5;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            filter: drop-shadow(0 0 10px rgba(255, 140, 0, 0.3));
        }

        .nfc-svg {
            width: 58px;
            height: 58px;
            stroke: #333333;
            stroke-width: 2.5;
            fill: none;
        }

        .hidden {
            display: none !important;
        }

        /* 状态文字 */
        .status-text {
            color: #444444;
            font-size: 1.1rem;
            margin-top: 20px;
            background: #f5f5f5;
            padding: 10px 28px;
            border-radius: 60px;
            border: 1px solid #dddddd;
            letter-spacing: 0.5px;
        }

        .status-text span {
            color: #ff8c00;
            font-weight: 600;
        }

        /* 右侧历史记录标题 */
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 12px 20px 12px;
            border-bottom: 1px solid #eaeaea;
        }

        .history-header h2 {
            color: #1a1a1a;
            font-size: 1.5rem;
            font-weight: 500;
        }

        .history-header .count {
            background: #f0f0f0;
            color: #ff8c00;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.9rem;
            border: 1px solid #dddddd;
        }

        /* 历史记录列表 */
        .history-list {
            flex: 1;
            overflow-y: auto;
            padding: 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-list::-webkit-scrollbar {
            width: 6px;
        }

        .history-list::-webkit-scrollbar-track {
            background: #f0f0f0;
            border-radius: 10px;
        }

        .history-list::-webkit-scrollbar-thumb {
            background: #cccccc;
            border-radius: 10px;
        }

        /* 历史记录卡片 - 黑白为主 */
        .history-item {
            background: #fafafa;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #eaeaea;
            display: flex;
            align-items: center;
            gap: 16px;
            transition: all 0.2s;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .history-item:hover {
            background: #f5f5f5;
            border-color: #ff8c00;
            transform: translateX(4px);
        }

        /* 头像 - 黑白 */
        .history-avatar {
            width: 52px;
            height: 52px;
            background: #2a2a2a;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: #ffffff;
            border: 2px solid #444444;
        }

        .history-info {
            flex: 1;
        }

        .history-name {
            color: #1a1a1a;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .history-meta {
            display: flex;
            gap: 12px;
            color: #666666;
            font-size: 0.85rem;
        }

        .history-meta span {
            background: #f0f0f0;
            padding: 2px 10px;
            border-radius: 20px;
        }

        .history-time {
            color: #ff8c00;
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* 今日统计 */
        .stats-footer {
            margin-top: 20px;
            padding: 16px 12px 8px 12px;
            border-top: 1px solid #eaeaea;
            color: #444444;
            display: flex;
            justify-content: space-between;
        }

        .stats-footer .today-count {
            background: #f0f0f0;
            padding: 6px 16px;
            border-radius: 30px;
            color: #ff8c00;
            font-weight: 500;
        }

        /* 测试按钮 */
        .test-btn-small {
            background: #f0f0f0;
            border: 1px solid #dddddd;
            color: #444444;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 16px;
        }

        .test-btn-small:hover {
            background: #ff8c00;
            color: #ffffff;
            border-color: #ff8c00;
        }

        /* NFC标签徽章 */
        .nfc-badge {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: #ff8c00;
            border-radius: 50%;
            margin-right: 4px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- 左侧：NFC打卡区域 -->
        <div class="left-panel">
            <div class="title-section">
                <h1>NFC 考勤系统</h1>
                <div class="sub">⚡ 持续待机中 · 靠近即可打卡</div>
            </div>

            <!-- NFC 空心圆 (持续跳动) -->
            <div class="nfc-container" id="circleContainer">
                <div class="glow-ring"></div>
                <div class="hollow-main"></div>
                
                <!-- 永久跳动波纹 - 橙色 -->
                <div class="ripple-permanent" id="rippleLayer">
                    <div class="pulse-ring-perm"></div>
                    <div class="pulse-ring-perm"></div>
                    <div class="pulse-ring-perm"></div>
                </div>

                <!-- 中央图标 -->
                <div class="center-icon" id="centerIcon">
                    <svg id="nfcSvg" class="nfc-svg" viewBox="0 0 40 40">
                        <path d="M12 20 Q 20 10, 28 20" stroke="currentColor" fill="none"/>
                        <path d="M8 25 Q 20 8, 32 25" stroke="currentColor" fill="none" opacity="0.8"/>
                        <circle cx="20" cy="29" r="2.5" fill="currentColor"/>
                    </svg>
                    <svg id="checkSvg" class="check-svg hidden" viewBox="0 0 50 50">
                        <path d="M10 27 L22 39 L42 13" stroke="currentColor" fill="none"/>
                    </svg>
                </div>
            </div>

            <!-- 状态显示 -->
            <div class="status-text" id="statusText">
                <span>⚪</span> 等待NFC卡片...
            </div>

            <!-- 测试按钮 -->
            <div class="test-btn-small" id="testBtn">
                🔄 模拟打卡 (测试)
            </div>
        </div>

        <!-- 右侧：历史记录面板 -->
        <div class="right-panel">
            <div class="history-header">
                <h2>📋 今日打卡记录</h2>
                <div class="count" id="todayCount">0 人</div>
            </div>

            <!-- 历史记录列表 -->
            <div class="history-list" id="historyList">
                <!-- 动态插入历史记录 -->
                <div class="history-item" style="opacity: 0.6;">
                    <div class="history-avatar">⏳</div>
                    <div class="history-info">
                        <div class="history-name">等待打卡...</div>
                        <div class="history-meta">
                            <span>--</span>
                        </div>
                    </div>
                    <div class="history-time">--:--</div>
                </div>
            </div>

            <!-- 底部统计 -->
            <div class="stats-footer">
                <span>📅 今日累计</span>
                <span class="today-count" id="totalCountSpan">0 次</span>
            </div>
        </div>
    </div>

    <script>
        (function() {
            // DOM 元素
            const nfcSvg = document.getElementById('nfcSvg');
            const checkSvg = document.getElementById('checkSvg');
            const centerIcon = document.getElementById('centerIcon');
            const testBtn = document.getElementById('testBtn');
            const statusText = document.getElementById('statusText');
            const historyList = document.getElementById('historyList');
            const todayCount = document.getElementById('todayCount');
            const totalCountSpan = document.getElementById('totalCountSpan');

            // 状态
            let nfcReader = null;
            let isScanning = false;
            let historyRecords = [];

            // 员工数据库 (带头像表情) - 黑白头像为主
            const staffDatabase = {
                // 真实NFC卡片ID
                '04:12:34:56:78:9A:BC': {
                    name: '张明远',
                    dept: '研发中心',
                    id: 'HW-2304',
                    avatar: '👨‍💻',
                },
                '04:23:45:67:89:AB:CD': {
                    name: '李思睿',
                    dept: '产品部',
                    id: 'HW-1789',
                    avatar: '👩‍💼',
                },
                '04:34:56:78:9A:BC:DE': {
                    name: '王华强',
                    dept: '测试部',
                    id: 'HW-5521',
                    avatar: '👨‍🔧',
                },
                '04:45:67:89:AB:CD:EF': {
                    name: '赵一鸣',
                    dept: '销售部',
                    id: 'HW-3321',
                    avatar: '👨‍💼',
                },
                '04:56:78:9A:BC:DE:F0': {
                    name: '孙小美',
                    dept: '人事部',
                    id: 'HW-7788',
                    avatar: '👩‍💼',
                },
                // 测试用户
                'test-user-1': {
                    name: '赵测试',
                    dept: '测试部',
                    id: 'TEST-001',
                    avatar: '🧪',
                },
                'test-user-2': {
                    name: '钱试用',
                    dept: '质量部',
                    id: 'TEST-002',
                    avatar: '🔬',
                },
                'test-user-3': {
                    name: '孙实验',
                    dept: '实验室',
                    id: 'TEST-003',
                    avatar: '⚗️',
                },
                'test-user-4': {
                    name: '李验证',
                    dept: '验证部',
                    id: 'TEST-004',
                    avatar: '📊',
                },
                'test-user-5': {
                    name: '周质检',
                    dept: '质控部',
                    id: 'TEST-005',
                    avatar: '🔍',
                },
                'default': {
                    name: '访客用户',
                    dept: '外部',
                    id: 'TEMP-001',
                    avatar: '👤',
                }
            };

            // 格式化当前时间 (时:分)
            function getCurrentTime() {
                const now = new Date();
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                return `${hours}:${minutes}`;
            }

            // 获取完整日期时间
            function getFullDateTime() {
                const now = new Date();
                const month = (now.getMonth() + 1).toString().padStart(2, '0');
                const day = now.getDate().toString().padStart(2, '0');
                const hours = now.getHours().toString().padStart(2, '0');
                const minutes = now.getMinutes().toString().padStart(2, '0');
                return `${month}-${day} ${hours}:${minutes}`;
            }

            // 根据NFC ID查找员工
            function findEmployeeByNfcId(nfcId) {
                const cleanId = nfcId.trim();
                return staffDatabase[cleanId] || staffDatabase['default'];
            }

            // 添加历史记录
            function addHistoryRecord(employee, source, nfcId = '') {
                const timeStr = getCurrentTime();
                const fullTimeStr = getFullDateTime();
                
                const record = {
                    id: Date.now() + Math.random(),
                    name: employee.name,
                    dept: employee.dept,
                    avatar: employee.avatar || '👤',
                    time: timeStr,
                    fullTime: fullTimeStr,
                    nfcId: nfcId,
                    source: source
                };
                
                historyRecords.unshift(record);
                if (historyRecords.length > 20) historyRecords.pop();
                
                renderHistory();
                updateStats();
            }

            // 渲染历史记录
            function renderHistory() {
                if (historyRecords.length === 0) {
                    historyList.innerHTML = `
                        <div class="history-item" style="opacity: 0.6;">
                            <div class="history-avatar">⏳</div>
                            <div class="history-info">
                                <div class="history-name">等待打卡...</div>
                                <div class="history-meta">
                                    <span>--</span>
                                </div>
                            </div>
                            <div class="history-time">--:--</div>
                        </div>
                    `;
                    return;
                }

                let html = '';
                historyRecords.forEach(record => {
                    const sourceIcon = record.source === 'test' ? '🧪' : '📱';
                    html += `
                        <div class="history-item">
                            <div class="history-avatar">${record.avatar}</div>
                            <div class="history-info">
                                <div class="history-name">${record.name}</div>
                                <div class="history-meta">
                                    <span>${record.dept}</span>
                                    <span>${sourceIcon} ${record.source === 'test' ? '测试' : 'NFC'}</span>
                                </div>
                            </div>
                            <div class="history-time">${record.time}</div>
                        </div>
                    `;
                });
                historyList.innerHTML = html;
            }

            // 更新统计
            function updateStats() {
                const count = historyRecords.length;
                todayCount.textContent = `${count} 人`;
                totalCountSpan.textContent = `${count} 次`;
            }

            // 显示打卡成功
            function showPunchSuccess(employee, source, nfcId = '') {
                // 切换到对勾（短暂显示后恢复NFC图标）
                nfcSvg.classList.add('hidden');
                checkSvg.classList.remove('hidden');
                
                // 状态文字
                statusText.innerHTML = `<span>✅</span> 打卡成功：${employee.name} (${employee.dept})`;
                
                // 添加历史记录
                addHistoryRecord(employee, source, nfcId);
                
                // 1.5秒后恢复NFC图标（但保持跳动）
                setTimeout(() => {
                    nfcSvg.classList.remove('hidden');
                    checkSvg.classList.add('hidden');
                    statusText.innerHTML = `<span>⚪</span> 等待NFC卡片...`;
                }, 1500);
            }

            // 初始化NFC（持续扫描）
            async function initNfc() {
                if (!('NDEFReader' in window)) {
                    statusText.innerHTML = `<span>❌</span> 浏览器不支持NFC（仅Android Chrome）`;
                    return;
                }

                try {
                    // 创建NFC读取器
                    nfcReader = new NDEFReader();
                    
                    // 监听读取事件
                    nfcReader.addEventListener('reading', event => {
                        // 获取NFC标签ID
                        let nfcId = event.serialNumber || '未知ID:' + Math.random().toString(16).substring(2, 10);
                        console.log('检测到NFC:', nfcId);
                        
                        // 查找员工
                        const employee = findEmployeeByNfcId(nfcId);
                        
                        // 显示成功
                        showPunchSuccess(employee, 'nfc', nfcId);
                    });

                    nfcReader.addEventListener('readingerror', error => {
                        console.error('NFC读取错误:', error);
                        statusText.innerHTML = `<span>⚠️</span> 读取失败，请重试`;
                    });

                    // 开始扫描 (持续)
                    await nfcReader.scan();
                    isScanning = true;
                    statusText.innerHTML = `<span>🟢</span> 持续待机中 · 靠近NFC打卡`;
                    
                } catch (error) {
                    console.error('NFC启动失败:', error);
                    statusText.innerHTML = `<span>❌</span> NFC启动失败: ${error.message}`;
                    isScanning = false;
                }
            }

            // 测试打卡
            function handleTestPunch() {
                // 随机选择测试用户
                const testUsers = ['test-user-1', 'test-user-2', 'test-user-3', 'test-user-4', 'test-user-5'];
                const randomUser = testUsers[Math.floor(Math.random() * testUsers.length)];
                const employee = staffDatabase[randomUser];
                
                showPunchSuccess(employee, 'test');
            }

            // 页面加载时自动初始化NFC
            window.addEventListener('load', () => {
                initNfc();
                
                // 添加一些示例历史记录（方便展示）
                setTimeout(() => {
                    if (historyRecords.length === 0) {
                        // 添加几条示例数据
                        showPunchSuccess(staffDatabase['test-user-1'], 'test');
                        setTimeout(() => {
                            showPunchSuccess(staffDatabase['test-user-2'], 'test');
                        }, 500);
                        setTimeout(() => {
                            showPunchSuccess(staffDatabase['test-user-3'], 'test');
                        }, 1000);
                    }
                }, 1000);
            });

            // 测试按钮
            testBtn.addEventListener('click', handleTestPunch);

            // 点击圆圈也可以测试
            document.querySelector('.nfc-container').addEventListener('click', handleTestPunch);

            // 页面卸载时停止NFC
            window.addEventListener('beforeunload', async () => {
                if (isScanning && nfcReader) {
                    try {
                        await nfcReader.stop();
                    } catch (e) {}
                }
            });
        })();
    </script>
</body>
</html>
